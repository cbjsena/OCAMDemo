  </text>

  <!-- Main network panel -->
  <rect x="82" y="150" width="1436" height="635" rx="16" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="2"/>
  <text x="118" y="202" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="25" font-weight="800" fill="#111827">
    시간순 후보 아크 위에서 선박 흐름 선택
  </text>

  <!-- time axis -->
  <line x1="215" y1="698" x2="1395" y2="698" stroke="#94A3B8" stroke-width="1.7"/>
  <line x1="215" y1="692" x2="215" y2="704" stroke="#94A3B8" stroke-width="1.7"/>
  <line x1="450" y1="692" x2="450" y2="704" stroke="#94A3B8" stroke-width="1.7"/>
  <line x1="685" y1="692" x2="685" y2="704" stroke="#94A3B8" stroke-width="1.7"/>
  <line x1="920" y1="692" x2="920" y2="704" stroke="#94A3B8" stroke-width="1.7"/>
  <line x1="1155" y1="692" x2="1155" y2="704" stroke="#94A3B8" stroke-width="1.7"/>
  <line x1="1395" y1="692" x2="1395" y2="704" stroke="#94A3B8" stroke-width="1.7"/>
  <text x="805" y="735" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="19" fill="#374151">시간</text>

  <!-- lane baselines -->
  <text x="160" y="300" text-anchor="end" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="24" font-weight="700" fill="#111827">FE1</text>
  <line x1="215" y1="294" x2="1395" y2="294" stroke="#CBD5E1" stroke-width="3"/>
  <text x="160" y="450" text-anchor="end" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="24" font-weight="700" fill="#111827">WA1</text>
  <line x1="215" y1="444" x2="1395" y2="444" stroke="#CBD5E1" stroke-width="3"/>
  <text x="160" y="600" text-anchor="end" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="24" font-weight="700" fill="#111827">EC2</text>
  <line x1="215" y1="594" x2="1395" y2="594" stroke="#CBD5E1" stroke-width="3"/>

  <!-- Nodes positions:
       FE1: PUS 270, SHA 455, SIN 735, RTM 1045, NYK 1290
