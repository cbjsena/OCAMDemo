  <g fill="none" stroke="#2563EB" stroke-width="6" stroke-linecap="round" marker-end="url(#blueArrow)">
    <path d="M215 294 L246 294"/>
    <path d="M294 294 L431 294"/>
    <path d="M479 294 L711 294"/>
    <path d="M759 294 L1021 294"/>
    <path d="M1069 294 L1395 294"/>
