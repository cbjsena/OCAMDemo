    <circle cx="735" cy="294" r="23" fill="#FFF7ED" stroke="#F97316" stroke-width="2.8"/>
    <text x="735" y="300" fill="#C2410C">SIN</text>
    <circle cx="1045" cy="294" r="23" fill="#FFF7ED" stroke="#F97316" stroke-width="2.8"/>
    <text x="1045" y="300" fill="#C2410C">RTM</text>
    <circle cx="1290" cy="294" r="23" fill="#FFF7ED" stroke="#F97316" stroke-width="2.8"/>
    <text x="1290" y="300" fill="#C2410C">NYK</text>

    <circle cx="330" cy="444" r="23" fill="#FFF7ED" stroke="#F97316" stroke-width="2.8"/>
    <text x="330" y="450" fill="#C2410C">LAX</text>
    <circle cx="610" cy="444" r="23" fill="#FFF7ED" stroke="#F97316" stroke-width="2.8"/>
