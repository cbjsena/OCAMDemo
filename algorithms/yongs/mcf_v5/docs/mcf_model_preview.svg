  <rect width="1600" height="900" fill="#ffffff"/>

  <text x="58" y="70" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="40" font-weight="800" fill="#111827">
    Multicommodity Flow 모델
  </text>
  <text x="58" y="108" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="27" font-weight="600" fill="#374151">
