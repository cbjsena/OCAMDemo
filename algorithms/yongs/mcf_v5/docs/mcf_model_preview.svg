    <circle cx="390" cy="594" r="23" fill="#FFF7ED" stroke="#F97316" stroke-width="2.8"/>
    <text x="390" y="600" fill="#C2410C">SGP</text>
    <circle cx="720" cy="594" r="23" fill="#FFF7ED" stroke="#F97316" stroke-width="2.8"/>
    <text x="720" y="600" fill="#C2410C">DXB</text>
