  <text x="612" y="263" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="18" fill="#ffffff">선박 A</text>
  <rect x="700" y="387" width="104" height="40" rx="20" fill="#16A34A"/>
  <text x="752" y="414" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="18" fill="#ffffff">선박 B</text>
  <rect x="760" y="532" width="104" height="40" rx="20" fill="#7C3AED"/>
  <text x="812" y="559" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="18" fill="#ffffff">선박 C</text>

  <!-- Bottom one-line summary -->
  <text x="800" y="835" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="26" font-weight="800" fill="#111827">
    모든 기항 노드가 한 번씩 커버되도록, 비용이 가장 작은 선박별 아크 조합을 선택한다
  </text>
