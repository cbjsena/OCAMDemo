<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5.2" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#111827"/>
    </marker>
    <marker id="candidateArrow" markerWidth="4" markerHeight="4" refX="3.3" refY="2" orient="auto">
      <path d="M0,0 L4,2 L0,4 z" fill="#9CA3AF"/>
    </marker>
    <marker id="blueArrow" markerWidth="4.5" markerHeight="4.5" refX="3.8" refY="2.25" orient="auto">
      <path d="M0,0 L4.5,2.25 L0,4.5 z" fill="#2563EB"/>
    </marker>
    <marker id="greenArrow" markerWidth="4.5" markerHeight="4.5" refX="3.8" refY="2.25" orient="auto">
      <path d="M0,0 L4.5,2.25 L0,4.5 z" fill="#16A34A"/>
    </marker>
    <marker id="purpleArrow" markerWidth="4.5" markerHeight="4.5" refX="3.8" refY="2.25" orient="auto">
      <path d="M0,0 L4.5,2.25 L0,4.5 z" fill="#7C3AED"/>
