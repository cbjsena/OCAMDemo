<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#111827"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <text x="58" y="70" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="40" font-weight="800" fill="#111827">
    가상선박 알고리즘 2
  </text>
  <text x="58" y="108" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="27" font-weight="600" fill="#374151">
    선박 V가 Phase-out한 뒤 남은 미충족 기항 일정에 실제 선박 B가 투입될 수 있는지 확인한다.
  </text>

  <!-- Left panel -->
  <text x="90" y="180" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="24" font-weight="800" fill="#111827">
    항로가 요구하는 기항 일정
  </text>

  <line x1="118" y1="255" x2="744" y2="255" stroke="#111827" stroke-width="5"/>
  <rect x="132" y="228" width="118" height="54" rx="7" fill="#2563EB"/>
  <text x="191" y="263" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="22" fill="#ffffff">선박 V</text>
  <rect x="262" y="228" width="152" height="54" rx="7" fill="#2563EB"/>
  <text x="338" y="263" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="22" fill="#ffffff">선박 V</text>
  <path d="M338 284 L338 328" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="338" y="359" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="20" fill="#111827">Phase Out</text>

  <rect x="444" y="228" width="112" height="54" rx="7" fill="#FFF7ED" stroke="#F97316" stroke-width="3" stroke-dasharray="9 7"/>
  <text x="500" y="263" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="20" fill="#C2410C">uncovered</text>
  <rect x="568" y="228" width="154" height="54" rx="7" fill="#FFF7ED" stroke="#F97316" stroke-width="3" stroke-dasharray="9 7"/>
  <text x="645" y="263" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="20" fill="#C2410C">uncovered</text>

  <line x1="444" y1="210" x2="444" y2="640" stroke="#16A34A" stroke-width="2.4" stroke-dasharray="8 8"/>
  <line x1="722" y1="210" x2="722" y2="640" stroke="#16A34A" stroke-width="2.4" stroke-dasharray="8 8"/>

  <text x="90" y="420" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="24" font-weight="800" fill="#111827">
    실제 선박별 일정표
  </text>

  <!-- Vessel A -->
  <text x="82" y="492" text-anchor="end" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="22" fill="#111827">선박 A</text>
  <rect x="118" y="456" width="626" height="56" rx="9" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
  <rect x="138" y="467" width="96" height="34" rx="5" fill="#CBD5E1"/>
  <rect x="242" y="467" width="144" height="34" rx="5" fill="#CBD5E1"/>
  <rect x="394" y="467" width="98" height="34" rx="5" fill="#CBD5E1"/>
  <rect x="500" y="467" width="172" height="34" rx="5" fill="#CBD5E1"/>
  <text x="186" y="490" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="18" fill="#111827">FE1 PUS</text>
  <text x="314" y="490" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="18" fill="#111827">FE1 SHA</text>
  <text x="443" y="490" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="18" fill="#111827">FE1 SIN</text>
  <text x="586" y="490" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="18" fill="#111827">FE1 RTM</text>

  <!-- Vessel B -->
  <text x="82" y="568" text-anchor="end" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="22" font-weight="700" fill="#111827">선박 B</text>
  <rect x="118" y="532" width="626" height="56" rx="9" fill="#FFFFFF" stroke="#16A34A" stroke-width="3"/>
  <rect x="138" y="543" width="126" height="34" rx="5" fill="#64748B"/>
  <text x="201" y="566" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="18" fill="#ffffff">DryDock</text>
  <text x="344" y="566" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="19" fill="#6B7280">이후 일정 없음</text>
  <rect x="444" y="540" width="278" height="40" rx="7" fill="#ECFDF5" stroke="#16A34A" stroke-width="2.5"/>
  <text x="583" y="566" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="21" font-weight="700" fill="#15803D">선박 B 투입 가능</text>

  <!-- Vessel C -->
  <text x="82" y="644" text-anchor="end" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="22" fill="#111827">선박 C</text>
  <rect x="118" y="608" width="626" height="56" rx="9" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
  <rect x="138" y="619" width="170" height="34" rx="5" fill="#CBD5E1"/>
  <rect x="316" y="619" width="108" height="34" rx="5" fill="#CBD5E1"/>
  <rect x="432" y="619" width="190" height="34" rx="5" fill="#CBD5E1"/>
  <text x="223" y="642" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="18" fill="#111827">WA1 LAX</text>
  <text x="370" y="642" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="18" fill="#111827">WA1 OAK</text>
  <text x="527" y="642" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="18" fill="#111827">WA1 PUS</text>

  <line x1="118" y1="690" x2="744" y2="690" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="118" y1="686" x2="118" y2="694" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="744" y1="686" x2="744" y2="694" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="275" y1="686" x2="275" y2="694" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="432" y1="686" x2="432" y2="694" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="588" y1="686" x2="588" y2="694" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="431" y="724" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="18" fill="#111827">시간</text>

  <!-- Decision -->
  <rect x="835" y="420" width="272" height="96" rx="9" fill="#F3F4F6" stroke="#111827" stroke-width="2.5"/>
  <text x="971" y="459" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="24" font-weight="800" fill="#111827">선박 B 일정에</text>
  <text x="971" y="493" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="24" font-weight="800" fill="#111827">추가 가능한가?</text>

  <!-- Branches only, no left input arrow -->
  <path d="M971 420 L971 330 L1160 330" stroke="#111827" stroke-width="2.6" fill="none"/>
  <path d="M971 516 L971 606 L1160 606" stroke="#111827" stroke-width="2.6" fill="none"/>
  <line x1="1160" y1="330" x2="1180" y2="330" stroke="#111827" stroke-width="2.6" marker-end="url(#arrow)"/>
  <line x1="1160" y1="606" x2="1190" y2="606" stroke="#111827" stroke-width="2.6" marker-end="url(#arrow)"/>

  <!-- Success result -->
  <text x="1160" y="225" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="24" font-weight="800" fill="#111827">
    가능: 선박 B 할당
  </text>
  <line x1="1195" y1="330" x2="1540" y2="330" stroke="#111827" stroke-width="5"/>
  <rect x="1202" y="303" width="82" height="54" rx="7" fill="#2563EB"/>
  <text x="1243" y="338" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="20" fill="#ffffff">선박 V</text>
  <rect x="1296" y="303" width="82" height="54" rx="7" fill="#2563EB"/>
  <text x="1337" y="338" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="20" fill="#ffffff">선박 V</text>
  <path d="M1337 358 L1337 402" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1337" y="433" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="20" fill="#111827">Phase Out</text>

  <rect x="1415" y="303" width="82" height="54" rx="7" fill="#16A34A"/>
  <text x="1456" y="338" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="20" fill="#ffffff">선박 B</text>
  <path d="M1456 408 L1456 360" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1456" y="437" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="20" fill="#111827">Phase In</text>
  <rect x="1509" y="303" width="82" height="54" rx="7" fill="#16A34A"/>
  <text x="1550" y="338" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="20" fill="#ffffff">선박 B</text>

  <!-- Failure result -->
  <rect x="1210" y="562" width="300" height="88" rx="10" fill="#F3E8FF" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="1360" y="598" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="23" font-weight="700" fill="#111827">
    불가능: 가상선박 할당
  </text>
  <text x="1360" y="630" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="23" fill="#111827">
    uncovered 기항 유지
  </text>
</svg>
