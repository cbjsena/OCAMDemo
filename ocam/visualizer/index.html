        {
          group: "operational",
          label: "Vessel Utilization Rate",
          value: formatPercent(vesselUtilizationRate),
          note: vesselServiceDays !== null && vesselAvailableDays !== null
            ? `${formatNumber(vesselServiceDays)} service days / ${formatNumber(vesselAvailableDays)} available days${vesselDrydockDays !== null ? ` (${formatNumber(vesselDrydockDays)} drydock days excluded)` : ""}`
            : "from evaluation output",
        },
        {
          group: "operational",
          label: "Slot Utilization Rate",
          value: formatPercent(slotRate),
          note: requiredTeuDays !== null && deployedTeuDays !== null
            ? `${formatNumber(requiredTeuDays)} required TEU-days / ${formatNumber(deployedTeuDays)} deployed TEU-days`
            : "from evaluation output",
        },
        {
          group: "operational",
          label: "TS Count",
          value: transshipmentCount === null ? "n/a" : formatNumber(transshipmentCount),
          note: firstDefinedNumber(objective, ["transshipment_count", "ts_count", "num_transshipments"]) !== null
            || firstDefinedNumber(metadata, ["transshipment_count", "ts_count", "num_transshipments"]) !== null
            ? "from evaluation output"
            : "detected from lane events",
        },
        {
          group: "operational",
          label: "Algorithm Runtime",
          value: runtime === null ? "n/a" : `${formatNumber(runtime)} sec`,
          note: "elapsed_seconds from metadata",
        },
      ];
    }

    function renderCostPanel(algorithm, analysis) {
      const objective = algorithm.metadata?.objectiveParsed || {};
      const entries = buildCostEntries(objective, analysis);
      const maxValue = Math.max(1, ...entries.filter((entry) => !entry.detail).map((entry) => Math.abs(entry.value)));
      return `
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Cost Breakdown</div>
          </div>
          <div class="panel-body">
            ${entries.length ? entries.map((entry) => renderCostBarRow(entry, maxValue, objective.total_cost)).join("") : `<div class="notice">objective 정보 없음</div>`}
          </div>
        </section>
      `;
    }

    function buildCostEntries(objective, analysis) {
      const entries = [];
      for (const name of ["bunker_cost", "canal_fee_cost", "transshipment_cost", "opportunity_cost"]) {
        if (typeof objective[name] !== "number") continue;
        entries.push({ key: name, value: objective[name], detail: false, offset: 0, segmentIndex: 0 });
        if (name !== "bunker_cost") continue;
        entries.push(...bunkerDetailEntries(objective, analysis, objective[name]));
      }
      return entries;
    }

    function bunkerDetailEntries(objective, analysis, bunkerTotal) {
      const detailKeys = [
        "bunker_cost_by_inlane_sail",
        "bunker_cost_by_port_stay",
        "bunker_cost_by_outlane_sail",
      ];
      let details = detailKeys.map((key) => ({ key, value: firstDefinedNumber(objective, [key]) }));
      if (details.some((entry) => entry.value === null)) {
        const byKey = {
          bunker_cost_by_inlane_sail: sumBunkerCostByStatus(analysis.events, "INLANE_SAIL"),
          bunker_cost_by_port_stay: sumBunkerCostByStatus(analysis.events, "PORT_STAY"),
          bunker_cost_by_outlane_sail: sumBunkerCostByStatus(analysis.events, "OUTLANE_SAIL"),
        };
        details = details.map((entry) => ({ key: entry.key, value: entry.value ?? byKey[entry.key] }));
      }
      if (details.some((entry) => entry.value === null)) return [];
      const detailSum = details.reduce((sum, entry) => sum + Math.abs(entry.value || 0), 0);
      if (!detailSum) return [];
      let offset = 0;
      return details.map((entry, index) => {
        const visualValue = bunkerTotal * Math.abs(entry.value) / detailSum;
        const result = {
          key: entry.key,
          value: entry.value,
          detail: true,
          offset,
          visualValue,
          segmentIndex: index,
        };
        offset += visualValue;
        return result;
      });
    }

    function sumBunkerCostByStatus(events, status) {
      let total = null;
      for (const event of events || []) {
        if (event.status !== status) continue;
        for (const row of event.costRows || []) {
          if (row.key !== "bunker_cost") continue;
          total = addNullableNumbers(total, row.value);
        }
      }
      return total;
    }

    function renderCostBarRow(entry, maxValue, totalCost) {
      const width = Math.max(entry.detail ? 0 : 1, Math.abs((entry.visualValue ?? entry.value) / maxValue * 100));
      const left = Math.abs((entry.offset || 0) / maxValue * 100);
      const fillClass = entry.detail ? `bar-fill segment bunker-detail-${entry.segmentIndex}` : "bar-fill";
      const fillStyle = entry.detail ? `left:${left}%;width:${width}%` : `width:${width}%`;
      return `
        <div class="bar-row ${entry.detail ? "detail" : ""}" data-cost-key="${escapeHtml(entry.key)}" data-cost-value="${escapeHtml(entry.value)}" data-cost-total="${escapeHtml(totalCost ?? "")}">
          <div class="bar-name" title="${escapeHtml(costLabel(entry.key))}">${escapeHtml(costLabel(entry.key))}</div>
          <div class="bar-track"><div class="${fillClass}" style="${fillStyle}"></div></div>
          <div class="bar-value">${escapeHtml(formatCostBarValue(entry.value, totalCost))}</div>
        </div>
      `;
    }

    function formatCostBarValue(value, totalCost) {
      const share = typeof totalCost === "number" && totalCost ? ` · ${formatPercentFixed(value / totalCost, 1)}` : "";
      return `${formatCompact(value)}${share}`;
    }

    function renderLanePanel(analysis) {
      const lanes = Object.entries(analysis.lanes)
        .sort((a, b) => b[1].events - a[1].events)
        .slice(0, 18);
      return `
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Lane Coverage</div>
          </div>
          <div class="panel-body">
            <div class="lane-grid">
              ${lanes.map(([lane, item]) => `
                <div class="lane-pill">
                  <strong>${escapeHtml(lane)}</strong>
                  <span>${formatNumber(item.vessels.size)} vessels · ${formatNumber(item.events)} events</span>
                </div>
              `).join("") || `<div class="notice">lane 정보 없음</div>`}
            </div>
          </div>
        </section>
      `;
    }

    function renderPositionDeclarationPanel(run, algorithm) {
      const summary = positionDeclarationSummary(algorithm);
      const selectedByKey = selectedPositionsByLaneProforma(algorithm.solution);
      const rows = summary
        ? (summary.rows || []).map((row) => ({
          key: laneProformaKey(row.lane_code, row.proforma_name),
          lane: row.lane_code,
          proforma: row.proforma_name,
          available: row.available_positions || [],
          selected: row.selected_positions || [],
          required: parseNumber(row.required_count),
          declaredCount: parseNumber(row.declared_count),
          effectiveFrom: parseDateValue(row.effective_from_date),
        }))
        : Array.from(selectedByKey.entries()).map(([key, selected]) => {
          const [lane, proforma] = key.split("::");
          return { key, lane, proforma, available: [], existing: [], selected, required: null, declaredCount: null, effectiveFrom: null };
        });
      const note = summary
        ? "from result metadata"
        : "position 후보 목록이 결과 metadata에 없습니다.";
      return `
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Position Declaration</div>
            <div class="notice">${escapeHtml(note)}</div>
          </div>
          <div class="panel-body">
            ${rows.length ? `<div class="position-declare-grid">${rows.map(renderPositionDeclarationRow).join("")}</div>` : `<div class="notice">position declaration 정보 없음</div>`}
          </div>
        </section>
      `;
    }

    function renderPositionDeclarationRow(row) {
      const selected = new Set(row.selected || []);
      const availableSet = new Set(row.available || []);
      const positions = row.available.length
        ? [...new Set([...row.available, ...selected])].sort((a, b) => a - b)
        : [...selected].sort((a, b) => a - b);
      const selectedCount = selected.size;
      const requiredText = row.required === null ? "required n/a" : `required ${formatNumber(row.required)}`;
      const countClass = row.required !== null && selectedCount !== row.required ? "position-declare-count status-warn" : "position-declare-count status-ok";
      const subtitle = [
        row.declaredCount !== null ? `positions 1-${row.declaredCount}` : "",
        row.effectiveFrom ? `from ${formatDateTime(row.effectiveFrom)}` : "",
      ].filter(Boolean).join(" · ");
      return `
        <div class="position-declare-row">
          <div>
            <div class="position-declare-title">${escapeHtml(row.lane)} / ${escapeHtml(row.proforma)}</div>
            <div class="position-declare-sub">${escapeHtml(subtitle || "solution declared positions")}</div>
          </div>
          <div class="position-chip-list">
            ${positions.map((position) => {
              const isSelected = selected.has(position);
              const isAvailable = !row.available.length || availableSet.has(position);
              const cls = [
                "position-chip",
                isSelected ? "selected" : "",
                isAvailable ? "" : "unavailable",
              ].filter(Boolean).join(" ");
              const text = isSelected
                ? `position ${position}: selected${isAvailable ? "" : " outside available list"}`
                : `position ${position}: available`;
              return `<span class="${cls}" data-text-tooltip="${escapeHtml(text)}">${escapeHtml(position)}</span>`;
            }).join("")}
          </div>
          <div class="${countClass}">${formatNumber(selectedCount)} / ${escapeHtml(requiredText)}</div>
        </div>
      `;
    }

    function selectedPositionsByLaneProforma(solution) {
      const selectedByKey = new Map();
      for (const row of solution?.declared_positions || []) {
        const lane = row.lane_code;
        const proforma = row.proforma_name;
        const position = parseInt(row.declared_position_no ?? row.position_no ?? row.vessel_position, 10);
        if (!lane || !proforma || !Number.isInteger(position)) continue;
        const key = laneProformaKey(lane, proforma);
        if (!selectedByKey.has(key)) selectedByKey.set(key, []);
        selectedByKey.get(key).push(position);
      }
      for (const positions of selectedByKey.values()) {
        positions.sort((a, b) => a - b);
      }
      return selectedByKey;
    }

    function positionDeclarationSummary(algorithm) {
      const raw = algorithm.metadata?.position_declaration_summary;
      if (!raw) return null;
      if (typeof raw === "object") return raw;
      if (typeof raw !== "string") return null;
      try {
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : null;
      } catch {
        return null;
      }
    }

    function laneProformaKey(lane, proforma) {
      return `${lane}::${proforma}`;
    }

    function renderTimelinePanel(algorithm, analysis) {
      const filtered = filteredEvents(analysis.events);
      const sorted = sortEvents(filtered);
      const laneGroupsForChains = groupByLane(sorted);
      const chains = detectTsChains(laneGroupsForChains);
      const groups = state.timelineView === "lane" ? laneGroupsForChains : groupByVessel(sorted);
      const canals = detectCanalPassages(groups);
      const guides = buildTimelineGuides(algorithm, groups);
      const range = timelineRange(filtered, guides);
      state.eventLookup = new Map(filtered.map((event) => [event.id, event]));
      return `
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">${state.timelineView === "lane" ? "Lane View" : "Vessel View"}</div>
            <div class="legend">
              ${legend("PORT", "var(--port)")}
              ${legend("SAIL IN", "var(--sail-in)")}
              ${legend("SAIL OUT", "var(--sail-out)")}
              ${legend("VESSEL", "var(--shipyard)")}
              ${legend("IDLE", "var(--idle)")}
            </div>
          </div>
          <div class="panel-body">
            <div class="timeline-controls">
              <label>Vessel Filter
                <input id="vesselSearch" type="search" value="${escapeHtml(state.vesselFilter)}" placeholder="V004, FE1, PORT_STAY">
              </label>
              <label>View
                <select id="timelineView">
                  <option value="vessel">Vessel</option>
                  <option value="lane">Lane</option>
                </select>
              </label>
              <label>Schedule
                <select id="timelineMode">
                  <option value="all">All vessels</option>
                  <option value="real">Real only</option>
                  <option value="virtual">Virtual only</option>
                </select>
              </label>
              <label>Sort
                <select id="sortMode">
                  <option value="vessel">Vessel</option>
                  <option value="lane">Lane</option>
                  <option value="start">Start time</option>
                  <option value="events">Event count</option>
                </select>
              </label>
              <label>Horizontal Scale
                <span class="zoom-control">
                  <input id="timelineZoom" type="range" min="0.25" max="20" step="0.01" value="${state.timelineZoom}">
                  <span id="zoomValue" class="zoom-value">${state.timelineZoom.toFixed(2)}x</span>
                </span>
              </label>
              <button id="fitButton" class="fit-button" title="타임라인 폭에 맞춤">Fit</button>
            </div>
            ${state.timelineView === "lane" ? renderTsSummary(chains) : ""}
            ${renderTimeline(groups, range, chains, canals, guides)}
          </div>
        </section>
      `;
    }

    function legend(label, color) {
      return `<span class="legend-item"><span class="dot" style="background:${color}"></span>${label}</span>`;
    }

    function buildTimelineGuides(algorithm, groups) {
      const global = [];
      const planning = extractPlanningHorizon(algorithm?.metadata || {});
      if (planning.start) global.push({ type: "planning", label: "Planning Start", when: planning.start });
      if (planning.end) global.push({ type: "planning", label: "Planning End", when: planning.end });
      const byGroup = new Map();
      if (state.timelineView === "lane") {
        for (const group of groups) {
          if (!group.events?.length) continue;
          byGroup.set(group.key, [
            { type: "service", label: "Service Start", when: group.events[0].start },
            { type: "service", label: "Service End", when: group.events[group.events.length - 1].end },
          ]);
        }
      }
      return { global, byGroup };
    }

    function extractPlanningHorizon(metadata) {
      const directStart = parseDateValue(metadata.planning_horizon_start);
      const directEnd = parseDateValue(metadata.planning_horizon_end);
      if (directStart || directEnd) return { start: directStart, end: directEnd };
      const raw = metadata.planning_horizon;
      if (!raw) return { start: null, end: null };
      try {
        const parsed = typeof raw === "string" ? JSON.parse(raw) : raw;
        return {
          start: parseDateValue(parsed?.start),
          end: parseDateValue(parsed?.end),
        };
      } catch {
        return { start: null, end: null };
      }
    }

    function parseDateValue(value) {
      if (!value) return null;
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function renderGuideLines(guides, range, duration, withLabels) {
      return (guides || []).map((guide) => {
        const left = ((guide.when - range.start) / duration) * 100;
        if (!Number.isFinite(left) || left < 0 || left > 100) return "";
        return `
          <div class="guide-line ${escapeHtml(guide.type)}" style="left:${left}%">
            ${withLabels ? `<span class="guide-label">${escapeHtml(guide.label)}</span>` : ""}
          </div>
        `;
      }).join("");
    }

    function renderVirtualCoverageBands(group, range, duration) {
      const virtualEvents = (group.events || []).filter((event) => event.isVirtual);
      if (!virtualEvents.length) return "";

      const intervals = virtualEvents
        .map((event) => {
          const start = Math.max(range.start.getTime(), event.start.getTime());
          const end = Math.min(range.end.getTime(), event.end.getTime());
          const opportunityRows = (event.costRows || []).filter((row) => row.key === "opportunity_cost");
          const opportunity = opportunityRows.length ? opportunityRows.reduce((sum, row) => sum + row.value, 0) : null;
          return { start, end, opportunity };
        })
        .filter((interval) => Number.isFinite(interval.start) && Number.isFinite(interval.end) && interval.end > interval.start)
        .sort((a, b) => a.start - b.start);

      if (!intervals.length) return "";

      const merged = [];
      for (const interval of intervals) {
        const previous = merged[merged.length - 1];
        if (!previous || interval.start > previous.end) {
          merged.push({ ...interval });
          continue;
        }
        previous.end = Math.max(previous.end, interval.end);
        previous.opportunity = addNullableNumbers(previous.opportunity, interval.opportunity);
      }

      return merged.map((interval) => {
        const left = ((interval.start - range.start.getTime()) / duration) * 100;
        const width = Math.max(0.4, ((interval.end - interval.start) / duration) * 100);
        const tooltip = [
          "Virtual vessel coverage",
          `${formatDateTime(new Date(interval.start))} - ${formatDateTime(new Date(interval.end))}`,
          `Opportunity cost: ${interval.opportunity === null ? "n/a" : formatUsd(interval.opportunity)}`,
        ].join("\n");
        return `<div class="virtual-band" style="left:${left}%;width:${width}%" data-text-tooltip="${escapeHtml(tooltip)}"></div>`;
      }).join("");
    }

    function renderTsSummary(chains) {
      if (!chains.length) return `<div class="notice">TS chain 없음. Lane view는 lane / proforma / position 단위로 이벤트를 이어서 보여줍니다.</div>`;
      const invalid = chains.filter((chain) => !chain.valid).length;
      const cls = invalid ? "status-warn" : "status-ok";
      return `<div class="notice ${cls}">TS chains: ${formatNumber(chains.length)}${invalid ? ` · check ${formatNumber(invalid)}` : ""}. Callouts show the handoff, while short unload/load events stay on the timeline.</div>`;
    }

    function renderTimeline(groups, range, chains = [], canals = [], guides = { global: [], byGroup: new Map() }) {
      if (!groups.length) return `<div class="notice">조건에 맞는 이벤트가 없습니다.</div>`;
      const ticks = makeTicks(range.start, range.end, 7);
      const duration = Math.max(1, range.end - range.start);
      const { labelWidth, trackWidth } = timelineDimensions();
      const totalWidth = labelWidth + trackWidth;
      return `
        <div class="timeline">
          <div id="timelineGrid" class="timeline-grid ${state.timelineView === "lane" ? "lane-view" : ""}" style="min-width:${totalWidth}px">
            <div class="time-axis">
              <div class="axis-label">${formatDate(range.start)}</div>
              <div class="axis-track">
                ${ticks.map((tick) => `<div class="tick" style="left:${((tick - range.start) / duration) * 100}%"><span>${formatDate(tick)}</span></div>`).join("")}
                ${renderGuideLines(guides.global, range, duration, true)}
              </div>
            </div>
            ${groups.map((group) => `
              <div class="vessel-row">
                <div class="vessel-label" title="${escapeHtml(group.title)}">${renderGroupLabel(group)}</div>
                <div class="event-track">
                  ${renderVirtualCoverageBands(group, range, duration)}
                  ${ticks.map((tick) => `<div class="tick" style="left:${((tick - range.start) / duration) * 100}%"></div>`).join("")}
                  ${renderGuideLines([...(guides.global || []), ...((guides.byGroup && guides.byGroup.get(group.key)) || [])], range, duration, false)}
                  ${state.timelineView === "lane" ? chains.filter((chain) => chain.groupKey === group.key).map((chain) => {
                    const left = ((chain.start - range.start) / duration) * 100;
                    const width = Math.max(0.4, ((chain.end - chain.start) / duration) * 100);
                    return `<div class="chain-band" style="left:${left}%;width:${width}%"></div>`;
                  }).join("") : ""}
                  ${chainCalloutsForGroup(chains, group, range, duration)}
                  ${canalCalloutsForGroup(canals, group, range, duration)}
                  ${group.events.map((event) => {
                    const left = ((event.start - range.start) / duration) * 100;
                    const tsClass = event.tsChainId ? " ts-chain-member" : "";
                    const width = eventWidthPercent(event, duration);
                    if (isPointEvent(event) || isMicroIntervalEvent(event, width)) {
                      const pointLeft = isPointEvent(event) ? left : eventMidpointPercent(event, range, duration);
                      const microClass = isPointEvent(event) ? "" : " micro-interval";
                      return `<div class="point-event ${escapeHtml(event.status)}${tsClass}${microClass}" style="left:${pointLeft}%" data-event-id="${escapeHtml(event.id)}"><span class="point-tag">${escapeHtml(pointEventLabel(event))}</span><span class="point-pin"></span></div>`;
                    }
                    return `<div class="event ${escapeHtml(event.status)} ${sailClass(event)}${tsClass}" style="left:${left}%;width:${width}%" data-event-id="${escapeHtml(event.id)}">${escapeHtml(eventShortLabel(event))}</div>`;
                  }).join("")}
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderDetailsPanel(algorithm, analysis) {
      const metadataRows = Object.entries(algorithm.metadata || {})
        .filter(([key]) => key !== "objectiveParsed")
        .map(([key, value]) => `<tr><td title="${escapeHtml(key)}">${escapeHtml(key)}</td><td title="${escapeHtml(value)}">${escapeHtml(value)}</td></tr>`)
        .join("");
      const errorBlock = isOk(algorithm) ? "" : `
        <section class="panel">
          <div class="panel-head"><div class="panel-title">Error</div></div>
          <div class="panel-body">
            <table>
              <tbody>
                <tr><th>Type</th><td>${escapeHtml(algorithm.metadata?.error_type || "-")}</td></tr>
                <tr><th>Message</th><td title="${escapeHtml(algorithm.metadata?.error_message || "")}">${escapeHtml(algorithm.metadata?.error_message || "-")}</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      `;
      return `
        ${errorBlock}
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Details</div>
            <div class="tabs">
              ${tabButton("metadata", "Metadata")}
              ${tabButton("events", "Events")}
              ${tabButton("logs", "Logs")}
              ${tabButton("json", "JSON")}
            </div>
          </div>
          <div class="panel-body">
            <div id="tab-metadata" class="${state.activeTab === "metadata" ? "" : "hide"}">
              <table><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>${metadataRows}</tbody></table>
            </div>
            <div id="tab-events" class="${state.activeTab === "events" ? "" : "hide"}">
              ${renderEventTable(analysis.events)}
            </div>
            <div id="tab-logs" class="${state.activeTab === "logs" ? "" : "hide"}">
              <pre class="log-box">${escapeHtml(algorithm.logs || "logs 정보 없음")}</pre>
            </div>
            <div id="tab-json" class="${state.activeTab === "json" ? "" : "hide"}">
              <pre class="json-box">${escapeHtml(JSON.stringify(algorithm.solution || {}, null, 2))}</pre>
            </div>
          </div>
        </section>
      `;
    }

    function tabButton(tab, label) {
      const active = state.activeTab === tab ? "tab active" : "tab";
      return `<button class="${active}" data-tab="${tab}">${label}</button>`;
    }

    function renderEventTable(events) {
      const rows = filteredEvents(events).slice(0, 300).map((event) => `
        <tr>
          <td title="${escapeHtml(event.vessel)}">${escapeHtml(event.vessel)}</td>
          <td title="${escapeHtml(event.status)}">${escapeHtml(event.status)}</td>
          <td title="${escapeHtml(event.lane || "-")}">${escapeHtml(event.lane || "-")}</td>
          <td title="${escapeHtml(event.port || "-")}">${escapeHtml(event.port || "-")}</td>
          <td title="${escapeHtml(formatDateTime(event.start))}">${escapeHtml(formatDateTime(event.start))}</td>
          <td title="${escapeHtml(formatDateTime(event.end))}">${escapeHtml(formatDateTime(event.end))}</td>
        </tr>
      `).join("");
      return `<table>
        <thead><tr><th>Vessel</th><th>Status</th><th>Lane</th><th>Port</th><th>Start</th><th>End</th></tr></thead>
        <tbody>${rows || `<tr><td colspan="6">이벤트 없음</td></tr>`}</tbody>
      </table>`;
    }

    function bindMainEvents() {
      const vesselSearch = document.getElementById("vesselSearch");
      const timelineView = document.getElementById("timelineView");
      const timelineMode = document.getElementById("timelineMode");
      const sortMode = document.getElementById("sortMode");
      const timelineZoom = document.getElementById("timelineZoom");
      const zoomValue = document.getElementById("zoomValue");
      if (vesselSearch) {
        vesselSearch.value = state.vesselFilter;
        vesselSearch.addEventListener("input", () => {
          state.vesselFilter = vesselSearch.value;
          renderMain();
        });
      }
      if (timelineView) {
        timelineView.value = state.timelineView;
        timelineView.addEventListener("change", () => {
          state.timelineView = timelineView.value;
          if (state.timelineView === "lane" && state.sortMode === "vessel") state.sortMode = "lane";
          if (state.timelineView === "vessel" && state.sortMode === "lane") state.sortMode = "vessel";
          renderMain();
        });
      }
      if (timelineMode) {
        timelineMode.value = state.timelineMode;
        timelineMode.addEventListener("change", () => {
          state.timelineMode = timelineMode.value;
          renderMain();
        });
      }
      if (sortMode) {
        sortMode.value = state.sortMode;
        sortMode.addEventListener("change", () => {
          state.sortMode = sortMode.value;
          renderMain();
        });
      }
      if (timelineZoom) {
        timelineZoom.value = state.timelineZoom;
        timelineZoom.addEventListener("input", () => {
          state.timelineZoom = Number(timelineZoom.value);
          renderTimelineOnly();
        });
      }
      document.querySelectorAll("[data-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeTab = button.dataset.tab;
          renderMain();
        });
      });
      const fitButton = document.getElementById("fitButton");
      if (fitButton) {
        fitButton.addEventListener("click", () => {
          state.timelineZoom = computeFitZoom();
          renderTimelineOnly();
          if (timelineZoom) timelineZoom.value = state.timelineZoom;
        });
      }
      bindTimelineTooltips();
      bindCostTooltips();
    }

    function renderTimelineOnly() {
      const timelineGrid = document.getElementById("timelineGrid");
      const zoomValue = document.getElementById("zoomValue");
      if (zoomValue) zoomValue.textContent = `${state.timelineZoom.toFixed(2)}x`;
      if (!timelineGrid) return;
      const { labelWidth, trackWidth } = timelineDimensions();
      timelineGrid.style.minWidth = `${labelWidth + trackWidth}px`;
    }

    function computeFitZoom() {
      const timeline = document.querySelector(".timeline");
      if (!timeline) return 1;
      const { labelWidth } = timelineDimensions();
      const availableTrackWidth = Math.max(240, timeline.clientWidth - labelWidth - 8);
      const fitZoom = availableTrackWidth / 980;
      return Math.max(0.25, Math.min(20, Number(fitZoom.toFixed(2))));
    }

    function timelineDimensions() {
      const labelWidth = state.timelineView === "lane" ? 230 : 150;
      const trackWidth = Math.round(980 * state.timelineZoom);
      return { labelWidth, trackWidth };
    }

    function chainCalloutsForGroup(chains, group, range, duration) {
      const visibleChains = chains.filter((chain) => {
        if (state.timelineView === "lane") return chain.groupKey === group.key;
        return group.vessel === chain.outgoing || group.vessel === chain.incoming;
      });
      return visibleChains.map((chain) => {
        const anchor = tsAnchorForGroup(chain, group);
        const left = ((anchor - range.start) / duration) * 100;
        const label = state.timelineView === "lane"
          ? "TS"
          : (group.vessel === chain.outgoing ? "TS OUT" : "TS IN");
        return `<div class="chain-callout" style="left:${left}%" data-text-tooltip="${escapeHtml(chainTooltip(chain))}">${escapeHtml(label)}</div>`;
      }).join("");
    }

    function chainTooltip(chain) {
      const tsCost = sumExplicitCosts(chain.events || [], "transshipment_cost");
      return [
        `TS Chain ${chain.id.toUpperCase()}`,
        `${chain.outgoing} -> ${chain.incoming}`,
        chain.tsPort && `Port: ${chain.tsPort}`,
        `Gap: ${chain.gapDays.toFixed(2)} days`,
        `TS Cost: ${tsCost === null ? "n/a" : formatUsd(tsCost)}`,
      ].filter(Boolean).join("\n");
    }

    function tsAnchorForGroup(chain, group) {
      if (state.timelineView === "lane") {
        return new Date((chain.phaseOutTime.getTime() + chain.phaseInTime.getTime()) / 2);
      }
      if (group.vessel === chain.outgoing) return chain.phaseOutTime;
      if (group.vessel === chain.incoming) return chain.phaseInTime;
      return new Date((chain.phaseOutTime.getTime() + chain.phaseInTime.getTime()) / 2);
    }

    function canalCalloutsForGroup(canals, group, range, duration) {
      return canals
        .filter((canal) => canal.groupKey === group.key)
        .map((canal) => {
          const left = ((canal.anchor - range.start) / duration) * 100;
          return `<div class="canal-callout" style="left:${left}%" data-text-tooltip="${escapeHtml(canalTooltip(canal))}">CANAL</div>`;
        }).join("");
    }

    function canalTooltip(canal) {
      const canalCost = sumExplicitCosts(canal.events || [], "canal_fee_cost");
      return [
        "Canal passage",
        canal.route,
        `${formatDateTime(canal.start)} - ${formatDateTime(canal.end)}`,
        `Canal fee: ${canalCost === null ? "n/a" : formatUsd(canalCost)}`,
      ].filter(Boolean).join("\n");
    }

    function analyzeSolution(solution) {
      const empty = {
        realVessels: 0,
        virtualVessels: 0,
        declaredPositions: 0,
        lanes: {},
        events: [],
        transshipmentCount: null,
      };
      if (!solution || typeof solution !== "object") return empty;
      const real = solution.vessel_schedules || {};
      const virtual = solution.virtual_vessel_schedules || {};
      const events = [
        ...extractScheduleEvents(real, false),
        ...extractScheduleEvents(virtual, true),
      ];
      const lanes = {};
      for (const event of events) {
        const lane = event.lane || "(none)";
        lanes[lane] ||= { vessels: new Set(), events: 0 };
        lanes[lane].vessels.add(event.vessel);
        lanes[lane].events += 1;
      }
      const eventsByLanePosition = new Map();
      for (const event of events) {
        if (!event.lane || !event.proforma || event.position === "") continue;
        const key = laneKey(event);
        if (!eventsByLanePosition.has(key)) eventsByLanePosition.set(key, []);
        eventsByLanePosition.get(key).push(event);
      }
      let transshipmentCount = 0;
      for (const laneEvents of eventsByLanePosition.values()) {
        const ordered = [...laneEvents].sort(laneEventCompare);
        for (let i = 0; i <= ordered.length - 4; i += 1) {
          if (!isTsChain(ordered.slice(i, i + 4))) continue;
          transshipmentCount += 1;
          i += 3;
        }
      }
      return {
        realVessels: Object.keys(real).length,
        virtualVessels: solutionVirtualVessels(solution),
        declaredPositions: Array.isArray(solution.declared_positions) ? solution.declared_positions.length : 0,
        lanes,
        events,
        transshipmentCount,
      };
    }

    function extractScheduleEvents(schedules, isVirtual) {
      const events = [];
      for (const [vessel, schedule] of Object.entries(schedules || {})) {
        const rawEvents = Array.isArray(schedule) ? schedule : schedule?.events || [];
        rawEvents.forEach((raw, index) => {
          const [start, end] = eventTimes(raw);
          if (!start || !end) return;
          events.push({
            id: `${vessel}-${index}-${raw.status || "UNKNOWN"}`,
            vessel,
            index,
            isVirtual,
            status: raw.status || "UNKNOWN",
            lane: raw.lane_code || "",
            proforma: raw.proforma_name || "",
            position: raw.position_no ?? "",
            port: raw.port_code || raw.from_port_code || raw.ts_port_code || raw.phase_in_port_code || raw.phase_out_port_code || raw.delivery_port_code || raw.redelivery_port_code || raw.dock_port_code || raw.to_port_code || "",
            endPort: raw.to_port_code || raw.port_code || raw.ts_port_code || raw.phase_in_port_code || raw.phase_out_port_code || raw.delivery_port_code || raw.redelivery_port_code || raw.dock_port_code || "",
            tsPort: raw.ts_port_code || "",
            start,
            end,
            raw,
            costRows: explicitEventCostRows(raw),
          });
        });
      }
      return events;
    }

    function explicitEventCostRows(raw) {
      const rows = [];
      const seen = new Set();
      const directKeys = Object.keys(raw || {}).filter((key) => {
        if (key in COST_LABELS) return true;
        return key.endsWith("_cost") || key.endsWith("_costs") || key.endsWith("_fee");
      });
      for (const key of directKeys) addExplicitCostRow(rows, seen, key, raw[key], key);
      for (const field of ["costs", "cost_breakdown", "event_costs"]) {
        const nested = raw?.[field];
        if (!nested || typeof nested !== "object" || Array.isArray(nested)) continue;
        for (const [key, value] of Object.entries(nested)) addExplicitCostRow(rows, seen, key, value, `${field}.${key}`);
      }
      return rows;
    }

    function addExplicitCostRow(rows, seen, key, rawValue, sourceField) {
      const value = parseNumber(rawValue);
      if (value === null || seen.has(sourceField)) return;
      seen.add(sourceField);
      const normalizedKey = normalizeCostKey(key);
      rows.push({ key: normalizedKey, label: costLabel(normalizedKey), value });
    }

    function normalizeCostKey(key) {
      return {
        canal_fee: "canal_fee_cost",
        canal_cost: "canal_fee_cost",
        sail_cost: "bunker_cost",
        sail_bunker_cost: "bunker_cost",
        inlane_sail_bunker_cost: "bunker_cost_by_inlane_sail",
        portstay_bunker_cost: "bunker_cost_by_port_stay",
        port_stay_bunker_cost: "bunker_cost_by_port_stay",
        outlane_sail_bunker_cost: "bunker_cost_by_outlane_sail",
        ts_cost: "transshipment_cost",
        transshipment_fee: "transshipment_cost",
        virtual_opportunity_cost: "opportunity_cost",
      }[key] || key;
    }

    function sumExplicitCosts(events, key) {
      let total = null;
      for (const event of events) {
        for (const row of event.costRows || []) {
          if (row.key !== key) continue;
          total = addNullableNumbers(total, row.value);
        }
      }
      return total;
    }

    function addNullableNumbers(left, right) {
      if (left === null && right === null) return null;
      return (left || 0) + (right || 0);
    }

    function eventTimes(event) {
      for (const [startKey, endKey] of EVENT_TIME_FIELDS) {
        if (event[startKey] && event[endKey]) {
          const start = new Date(event[startKey]);
          const end = new Date(event[endKey]);
          if (!Number.isNaN(start.getTime()) && !Number.isNaN(end.getTime())) return [start, end];
        }
      }
      const dates = Object.entries(event)
        .filter(([key, value]) => typeof value === "string" && key.match(/(start|end|date|time)$/i))
        .map(([, value]) => new Date(value))
        .filter((date) => !Number.isNaN(date.getTime()))
        .sort((a, b) => a - b);
      return dates.length ? [dates[0], dates[dates.length - 1]] : [null, null];
    }

    function filteredEvents(events) {
      const query = state.vesselFilter.trim().toLowerCase();
      return events.filter((event) => {
        if (state.timelineMode === "real" && event.isVirtual) return false;
        if (state.timelineMode === "virtual" && !event.isVirtual) return false;
        if (!query) return true;
        const haystack = [event.vessel, event.status, event.lane, event.proforma, event.port].join(" ").toLowerCase();
        return haystack.includes(query);
      });
    }

    function sortEvents(events) {
      return [...events].sort((a, b) => {
        if (state.sortMode === "lane") return (a.lane || "").localeCompare(b.lane || "") || a.start - b.start;
        if (state.sortMode === "start") return a.start - b.start;
        return a.vessel.localeCompare(b.vessel, undefined, { numeric: true }) || a.start - b.start;
      });
    }

    function groupByVessel(events) {
      const map = new Map();
      for (const event of events) {
        if (!map.has(event.vessel)) {
          map.set(event.vessel, {
            key: event.vessel,
            title: event.vessel,
            vessel: event.vessel,
            isVirtual: event.isVirtual,
            events: [],
          });
        }
        map.get(event.vessel).events.push(event);
      }
      const groups = Array.from(map.values());
      if (state.sortMode === "events") {
        groups.sort((a, b) => b.events.length - a.events.length || a.vessel.localeCompare(b.vessel, undefined, { numeric: true }));
      } else if (state.sortMode === "lane") {
        groups.sort((a, b) => (a.events[0]?.lane || "").localeCompare(b.events[0]?.lane || "") || a.vessel.localeCompare(b.vessel));
      } else if (state.sortMode === "start") {
        groups.sort((a, b) => a.events[0].start - b.events[0].start);
      } else {
        groups.sort((a, b) => a.vessel.localeCompare(b.vessel, undefined, { numeric: true }));
      }
      return groups;
    }

    function groupByLane(events) {
      const map = new Map();
      for (const event of events.filter((item) => item.lane && item.proforma && item.position !== "")) {
        const key = laneKey(event);
        if (!map.has(key)) {
          map.set(key, {
            key,
            title: key,
            lane: event.lane,
            proforma: event.proforma,
            position: event.position,
            events: [],
          });
        }
        map.get(key).events.push(event);
      }
      const groups = Array.from(map.values());
      for (const group of groups) {
        group.events.sort(laneEventCompare);
        group.vessels = new Set(group.events.map((event) => event.vessel));
      }
      if (state.sortMode === "events") {
        groups.sort((a, b) => b.events.length - a.events.length || a.key.localeCompare(b.key, undefined, { numeric: true }));
      } else if (state.sortMode === "start") {
        groups.sort((a, b) => a.events[0].start - b.events[0].start);
      } else {
        groups.sort((a, b) => a.lane.localeCompare(b.lane, undefined, { numeric: true }) || a.proforma.localeCompare(b.proforma, undefined, { numeric: true }) || Number(a.position) - Number(b.position));
      }
      return groups;
    }

    function laneKey(event) {
      return `${event.lane}/${event.proforma}/${event.position}`;
    }

    function laneEventCompare(a, b) {
      return a.start - b.start || lanePriority(a.status) - lanePriority(b.status) || a.end - b.end || a.vessel.localeCompare(b.vessel);
    }

    function lanePriority(status) {
      return {
        TRANSSHIPMENT_UNLOAD: 0,
        PHASE_OUT: 1,
        PHASE_IN: 2,
        TRANSSHIPMENT_LOAD: 3,
      }[status] ?? 9;
    }

    function detectTsChains(groups) {
      const chains = [];
      for (const group of groups) {
        for (const event of group.events) delete event.tsChainId;
        if (!group.lane) continue;
        const ordered = [...group.events].sort(laneEventCompare);
        for (let i = 0; i <= ordered.length - 4; i += 1) {
          const slice = ordered.slice(i, i + 4);
          if (!isTsChain(slice)) continue;
          const id = `ts-${chains.length + 1}`;
          for (const event of slice) event.tsChainId = id;
          const outgoing = slice[1].vessel;
          const incoming = slice[2].vessel;
          const gapDays = (slice[2].end - slice[1].end) / 86400000;
          chains.push({
            id,
            groupKey: group.key,
            events: slice,
            start: slice[0].start,
            end: slice[3].end,
            phaseOutTime: slice[1].end,
            phaseInTime: slice[2].start,
            outgoing,
            incoming,
            tsPort: slice[0].tsPort || slice[3].tsPort || slice[0].port,
            gapDays,
            valid: outgoing !== incoming && gapDays >= 1 && gapDays <= 7,
          });
          i += 3;
        }
      }
      return chains;
    }

    function isTsChain(events) {
      return events.map((event) => event.status).join(">") === "TRANSSHIPMENT_UNLOAD>PHASE_OUT>PHASE_IN>TRANSSHIPMENT_LOAD";
    }

    function detectCanalPassages(groups) {
      const passages = [];
      for (const group of groups) {
        const events = [...group.events].sort(laneEventCompare);
        for (let i = 0; i < events.length; i += 1) {
          const two = events.slice(i, i + 2);
          if (isOutlaneCanalPair(two)) {
            passages.push(makeCanalPassage(group.key, two, two[0].end));
            i += 1;
            continue;
          }
          const three = events.slice(i, i + 3);
          if (isInlaneCanalPortStay(three)) {
            passages.push(makeCanalPassage(group.key, three, eventCenterTime(three[1])));
            i += 2;
          }
        }
      }
      return passages;
    }

    function isOutlaneCanalPair(events) {
      return events.length === 2
        && events.every((event) => event.status === "OUTLANE_SAIL")
        && touchesCanalPort(events[0])
        && touchesCanalPort(events[1])
        && connectedEvents(events[0], events[1]);
    }

    function isInlaneCanalPortStay(events) {
      return events.length === 3
        && events[0].status === "INLANE_SAIL"
        && events[1].status === "PORT_STAY"
        && events[2].status === "INLANE_SAIL"
        && touchesCanalPort(events[1])
        && connectedEvents(events[0], events[1])
        && connectedEvents(events[1], events[2]);
    }

    function touchesCanalPort(event) {
      return eventPorts(event).some((port) => CANAL_PORTS.has(port));
    }

    function connectedEvents(left, right) {
      const leftEnd = endPort(left);
      const rightStart = startPort(right);
      return leftEnd && rightStart && leftEnd === rightStart;
    }

    function makeCanalPassage(groupKey, events, anchor) {
      return {
        groupKey,
        start: events[0].start,
        end: events[events.length - 1].end,
        anchor,
        route: events.flatMap(eventPorts).filter(Boolean).filter((port, index, ports) => index === 0 || port !== ports[index - 1]).join(" -> "),
        events,
      };
    }

    function eventCenterTime(event) {
      return new Date((event.start.getTime() + event.end.getTime()) / 2);
    }

    function eventPorts(event) {
      return [startPort(event), endPort(event)].filter(Boolean);
    }

    function startPort(event) {
      return event.raw.from_port_code || event.raw.port_code || event.raw.ts_port_code || event.raw.phase_in_port_code || event.raw.phase_out_port_code || event.raw.delivery_port_code || event.raw.dock_port_code || "";
    }

    function endPort(event) {
      return event.raw.to_port_code || event.raw.port_code || event.raw.ts_port_code || event.raw.phase_in_port_code || event.raw.phase_out_port_code || event.raw.redelivery_port_code || event.raw.dock_port_code || "";
    }

    function renderGroupLabel(group) {
      if (state.timelineView === "lane" && group.lane) {
        return `
          <span class="lane-label-main">${escapeHtml(group.lane)} / ${escapeHtml(group.proforma)} / #${escapeHtml(group.position)}</span>
          <span class="lane-label-sub">${formatNumber(group.vessels?.size || 0)} vessels · ${formatNumber(group.events.length)} events</span>
        `;
      }
      return `${escapeHtml(group.vessel)}${group.isVirtual ? " · V" : ""}`;
    }

    function eventRange(events) {
      const starts = events.map((event) => event.start.getTime());
      const ends = events.map((event) => event.end.getTime());
      const start = new Date(Math.min(...starts));
      const end = new Date(Math.max(...ends));
      if (!events.length || Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) {
        const now = new Date();
        return { start: now, end: new Date(now.getTime() + 86400000) };
      }
      return { start, end };
    }

    function timelineRange(events, guides) {
      const base = eventRange(events);
      const guideTimes = [
        ...(guides?.global || []).map((guide) => guide.when.getTime()),
        ...Array.from((guides?.byGroup || new Map()).values()).flat().map((guide) => guide.when.getTime()),
      ].filter((value) => Number.isFinite(value));
      if (!guideTimes.length) return base;
      return {
        start: new Date(Math.min(base.start.getTime(), ...guideTimes)),
        end: new Date(Math.max(base.end.getTime(), ...guideTimes)),
      };
    }

    function makeTicks(start, end, count) {
      const ticks = [];
      const step = (end - start) / Math.max(1, count - 1);
      for (let i = 0; i < count; i += 1) ticks.push(new Date(start.getTime() + step * i));
      return ticks;
    }

    function eventShortLabel(event) {
      if (event.status === "PORT_STAY") return event.port || event.lane || event.status;
      if (event.status.includes("SAIL")) return `${event.raw.from_port_code || ""}→${event.raw.to_port_code || ""}`;
      if (event.status === "TRANSSHIPMENT_UNLOAD") return `Unload ${event.tsPort || event.port}`;
      if (event.status === "TRANSSHIPMENT_LOAD") return `Load ${event.tsPort || event.port}`;
      if (event.status === "PHASE_OUT") return `Out ${event.vessel}`;
      if (event.status === "PHASE_IN") return `In ${event.vessel}`;
      return event.lane || event.port || event.status;
    }

    function isPointEvent(event) {
      return event.end.getTime() <= event.start.getTime();
    }

    function eventWidthPercent(event, duration) {
      return Math.max(0, ((event.end - event.start) / duration) * 100);
    }

    function eventMidpointPercent(event, range, duration) {
      const midpoint = (event.start.getTime() + event.end.getTime()) / 2;
      return ((midpoint - range.start.getTime()) / duration) * 100;
    }

    function isMicroIntervalEvent(event, widthPercent) {
      if (event.status === "TRANSSHIPMENT_UNLOAD" || event.status === "TRANSSHIPMENT_LOAD") return true;
      return widthPercent < 0.08;
    }

    function pointEventLabel(event) {
      if (event.tsChainId && event.status === "PHASE_IN") return "TS-PI";
      if (event.tsChainId && event.status === "PHASE_OUT") return "TS-PO";
      return {
        PHASE_IN: "PI",
        PHASE_OUT: "PO",
        DELIVERY: "DEL",
        REDELIVERY: "RED",
        TRANSSHIPMENT_UNLOAD: "TS-U",
        TRANSSHIPMENT_LOAD: "TS-L",
      }[event.status] || event.status.replaceAll("_", " ").slice(0, 8);
    }

    function sailClass(event) {
      if (event.status === "INLANE_SAIL") return "sail-in";
      if (event.status === "OUTLANE_SAIL") return "sail-out";
      return "";
    }

    function bindTimelineTooltips() {
      const tooltip = ensureTooltip();
      document.querySelectorAll("[data-event-id]").forEach((node) => {
        node.addEventListener("mouseenter", () => {
          const event = findRenderedEvent(node.dataset.eventId);
          if (!event) return;
          tooltip.innerHTML = renderTooltip(event);
          tooltip.classList.remove("hide");
        });
        node.addEventListener("mousemove", (mouseEvent) => positionTooltip(tooltip, mouseEvent));
        node.addEventListener("mouseleave", () => tooltip.classList.add("hide"));
      });
    }

    function bindCostTooltips() {
      const tooltip = ensureTooltip();
      document.querySelectorAll("[data-cost-key]").forEach((node) => {
        node.addEventListener("mouseenter", () => {
          const key = node.dataset.costKey;
          const value = parseNumber(node.dataset.costValue);
          const total = parseNumber(node.dataset.costTotal);
          tooltip.innerHTML = renderCostTooltip(key, value, total);
          tooltip.classList.remove("hide");
        });
        node.addEventListener("mousemove", (mouseEvent) => positionTooltip(tooltip, mouseEvent));
        node.addEventListener("mouseleave", () => tooltip.classList.add("hide"));
      });
      document.querySelectorAll("[data-text-tooltip]").forEach((node) => {
        node.addEventListener("mouseenter", () => {
          tooltip.innerHTML = renderTextTooltip(node.dataset.textTooltip || "");
          tooltip.classList.remove("hide");
        });
        node.addEventListener("mousemove", (mouseEvent) => positionTooltip(tooltip, mouseEvent));
        node.addEventListener("mouseleave", () => tooltip.classList.add("hide"));
      });
    }

    function ensureTooltip() {
      let tooltip = document.getElementById("eventTooltip");
      if (!tooltip) {
        tooltip = document.createElement("div");
        tooltip.id = "eventTooltip";
        tooltip.className = "tooltip hide";
        document.body.appendChild(tooltip);
      }
      return tooltip;
    }

    function positionTooltip(tooltip, mouseEvent) {
      const margin = 14;
      const rect = tooltip.getBoundingClientRect();
      let left = mouseEvent.clientX + margin;
      let top = mouseEvent.clientY + margin;
      if (left + rect.width > window.innerWidth - margin) left = mouseEvent.clientX - rect.width - margin;
      if (top + rect.height > window.innerHeight - margin) top = mouseEvent.clientY - rect.height - margin;
      tooltip.style.left = `${Math.max(margin, left)}px`;
      tooltip.style.top = `${Math.max(margin, top)}px`;
    }

    function findRenderedEvent(eventId) {
      return state.eventLookup.get(eventId);
    }

    function renderTooltip(event) {
      const rows = [
        ["Vessel", `${event.vessel}${event.isVirtual ? " (virtual)" : ""}`],
        ["Lane", event.lane ? `${event.lane} / ${event.proforma} / #${event.position}` : "-"],
        ["Port", readablePort(event)],
        ["Start", formatDateTime(event.start)],
        ["End", formatDateTime(event.end)],
        ["Duration", formatDuration(event.end - event.start)],
      ];
      if (event.tsChainId) rows.push(["TS Chain", event.tsChainId.toUpperCase()]);
      if (event.status.includes("SAIL")) {
        rows.push(["Route", `${event.raw.from_port_code || "-"} → ${event.raw.to_port_code || "-"}`]);
        const distance = firstDefinedNumber(event.raw, ["distance", "sailing_distance", "total_distance"]);
        const avgSpeed = firstDefinedNumber(event.raw, ["avg_speed", "average_speed"]);
        if (distance !== null) rows.push(["Distance", formatNumber(distance)]);
        if (avgSpeed !== null) rows.push(["Avg Speed", `${formatNumber(avgSpeed)} kn`]);
      }
      if (event.status.startsWith("TRANSSHIPMENT")) rows.push(["TS Port", event.tsPort || "-"]);
      for (const row of eventCostDisplayRows(event)) {
        rows.push([row.label, formatUsd(row.value)]);
      }
      return `
        <div class="tooltip-title">
          <span>${escapeHtml(eventShortLabel(event))}</span>
          <span class="tooltip-status">${escapeHtml(event.status)}</span>
        </div>
        <div class="tooltip-grid">
          ${rows.map(([key, value]) => `
            <div class="tooltip-key">${escapeHtml(key)}</div>
            <div class="tooltip-value">${escapeHtml(value)}</div>
          `).join("")}
        </div>
      `;
    }

    function eventCostDisplayRows(event) {
      const displayKeys = new Set(displayCostKeysForEvent(event));
      const rows = (event.costRows || []).filter((row) => displayKeys.has(row.key));
      const present = new Set(rows.map((row) => row.key));
      for (const key of displayKeys) {
        if (present.has(key)) continue;
        rows.push({ key, label: costLabel(key), value: null });
      }
      return rows;
    }

    function displayCostKeysForEvent(event) {
      const keys = [];
      if (!event.isVirtual && (event.status.includes("SAIL") || event.status === "PORT_STAY")) keys.push("bunker_cost");
      if (!event.isVirtual && event.status.startsWith("TRANSSHIPMENT")) keys.push("transshipment_cost");
      if (event.isVirtual) keys.push("opportunity_cost");
      if (!event.isVirtual && event.status === "PORT_STAY" && touchesCanalPort(event)) keys.push("canal_fee_cost");
      return keys;
    }

    function renderCostTooltip(key, value, total) {
      const rows = [
        ["Amount", value === null ? "n/a" : formatUsd(value)],
        ["Share", value !== null && total ? formatPercent(value / total) : "n/a"],
        ["Meaning", costDescription(key)],
      ];
      return `
        <div class="tooltip-title">
          <span>${escapeHtml(costLabel(key))}</span>
          <span class="tooltip-status">Cost</span>
        </div>
        <div class="tooltip-grid">
          ${rows.map(([rowKey, rowValue]) => `
            <div class="tooltip-key">${escapeHtml(rowKey)}</div>
            <div class="tooltip-value">${escapeHtml(rowValue)}</div>
          `).join("")}
        </div>
      `;
    }

    function renderTextTooltip(text) {
      const lines = String(text || "").split("\n").filter(Boolean);
      const [title, ...rows] = lines;
      return `
        <div class="tooltip-title">
          <span>${escapeHtml(title || "Info")}</span>
        </div>
        <div class="tooltip-grid">
          ${rows.map((line) => {
            const index = line.indexOf(": ");
            if (index <= 0) return `<div class="tooltip-line">${escapeHtml(line)}</div>`;
            const key = line.slice(0, index);
            const value = line.slice(index + 2).trim();
            return `
              <div class="tooltip-key">${escapeHtml(key)}</div>
              <div class="tooltip-value">${escapeHtml(value)}</div>
            `;
          }).join("")}
        </div>
      `;
    }

    function readablePort(event) {
      if (event.raw.from_port_code || event.raw.to_port_code) {
        return `${event.raw.from_port_code || "-"} → ${event.raw.to_port_code || "-"}`;
      }
      return event.port || event.tsPort || event.raw.phase_in_port_code || event.raw.phase_out_port_code || event.raw.delivery_port_code || event.raw.redelivery_port_code || event.raw.dock_port_code || "-";
    }

    function firstDefinedNumber(source, keys) {
      for (const key of keys) {
        const value = parseNumber(source?.[key]);
        if (value !== null) return value;
      }
      return null;
    }

    function formatDuration(ms) {
      const minutes = Math.max(0, Math.round(ms / 60000));
      if (minutes < 60) return `${minutes} min`;
      const hours = minutes / 60;
      if (hours < 48) return `${hours.toFixed(hours >= 10 ? 0 : 1)} hr`;
      const days = hours / 24;
      return `${days.toFixed(days >= 10 ? 0 : 1)} days`;
    }

    function getSelectedRun() {
      return state.runs.find((run) => run.name === state.selectedRun);
    }

    function getSelectedAlgorithm() {
      return getSelectedRun()?.algorithms.find((algorithm) => algorithm.key === state.selectedAlgorithm);
    }

    function isOk(algorithm) {
      return (algorithm.metadata?.status || "").toLowerCase() === "ok";
    }

    function readableStatus(algorithm) {
      const status = algorithm.metadata?.status || "unknown";
      if (status.toLowerCase() === "ok") return "feasible";
      if (algorithm.metadata?.error_type === "InfeasibleError") return "infeasible";
      if (status.toLowerCase() === "error") return "error";
      return status;
    }

    function lowerBoundIsOk(lowerBound) {
      const runStatus = lowerBoundRunStatus(lowerBound).toLowerCase();
      const solverStatus = lowerBoundSolverStatus(lowerBound).toUpperCase();
      return runStatus === "ok" || solverStatus === "OPTIMAL";
    }

    function readableLowerBoundStatus(lowerBound) {
      const runStatus = lowerBoundRunStatus(lowerBound);
      const solverStatus = lowerBoundSolverStatus(lowerBound);
      if (runStatus && solverStatus && runStatus.toLowerCase() === "ok") return `ok · ${solverStatus}`;
      if (runStatus && solverStatus && runStatus !== solverStatus) return `${runStatus} · ${solverStatus}`;
      return runStatus || solverStatus || "unknown";
    }

    function lowerBoundRunStatus(lowerBound) {
      const status = lowerBound?.status ?? lowerBound?.metadata?.status ?? "";
      if (isGurobiStatusCode(status)) return "";
      return String(status || "");
    }

    function lowerBoundSolverStatus(lowerBound) {
      const objective = lowerBound?.objective || {};
      const metadata = lowerBound?.metadata || {};
      return gurobiStatusText(
        objective.status ?? metadata.model_status ?? metadata.status,
        objective.status_name ?? metadata.model_status_name ?? metadata.status_name,
      );
    }

    function gurobiStatusText(status, statusName) {
      if (statusName !== undefined && statusName !== null && statusName !== "") return String(statusName);
      const code = Number(status);
      if (!Number.isInteger(code)) return "";
      return {
        1: "LOADED",
        2: "OPTIMAL",
        3: "INFEASIBLE",
        4: "INF_OR_UNBD",
        5: "UNBOUNDED",
        6: "CUTOFF",
        7: "ITERATION_LIMIT",
        8: "NODE_LIMIT",
        9: "TIME_LIMIT",
        10: "SOLUTION_LIMIT",
        11: "INTERRUPTED",
        12: "NUMERIC",
        13: "SUBOPTIMAL",
        14: "INPROGRESS",
        15: "USER_OBJ_LIMIT",
      }[code] || `Gurobi ${code}`;
    }

    function isGurobiStatusCode(value) {
      return value !== undefined && value !== null && /^\d+$/.test(String(value).trim());
    }

    function formatNumber(value) {
      if (value === undefined || value === null || value === "" || Number.isNaN(Number(value))) return "-";
      return new Intl.NumberFormat("en-US", { maximumFractionDigits: 2 }).format(Number(value));
    }

    function formatCompact(value) {
      if (value === undefined || value === null || Number.isNaN(Number(value))) return "-";
      return new Intl.NumberFormat("en-US", { notation: "compact", maximumFractionDigits: 2 }).format(Number(value));
    }

    function formatUsd(value) {
      if (value === undefined || value === null || Number.isNaN(Number(value))) return "n/a";
      return `$${formatNumber(value)}`;
    }

    function formatPercent(value) {
      if (value === undefined || value === null || Number.isNaN(Number(value))) return "n/a";
      return `${formatNumber(Number(value) * 100)}%`;
    }

    function formatPercentFixed(value, digits) {
      if (value === undefined || value === null || Number.isNaN(Number(value))) return "n/a";
      return `${(Number(value) * 100).toFixed(digits)}%`;
    }

    function costLabel(key) {
      return COST_LABELS[key] || key.replaceAll("_", " ");
    }

    function costDescription(key) {
      return COST_DESCRIPTIONS[key] || "Objective cost component";
    }

    function formatDate(date) {
      return new Intl.DateTimeFormat("en-US", { month: "short", day: "2-digit" }).format(date);
    }

    function formatDateTime(date) {
      return new Intl.DateTimeFormat("sv-SE", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
      }).format(date);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
