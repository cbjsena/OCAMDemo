<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OCAM Solution Visualizer</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #66727e;
      --line: #d9e1e7;
      --panel: #ffffff;
      --page: #f5f7f9;
      --brand: #176f86;
      --brand-strong: #0f5568;
      --ok: #12845f;
      --bad: #bf3b3b;
      --warn: #b06b00;
      --port: #2775b6;
      --sail-in: #2f9278;
      --sail-out: #8b5fbf;
      --phase: #2775b6;
      --shipyard: #c26b4f;
      --idle: #7a8793;
      --shadow: 0 10px 30px rgba(23, 32, 38, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 1120px;
      background: var(--page);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      min-height: 38px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--brand);
    }

    button.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: white;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      min-height: 38px;
      padding: 0 10px;
    }

    input[type="range"] {
      padding: 0;
      accent-color: var(--brand);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 14px 20px;
      background: #fbfcfd;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 18px;
      white-space: nowrap;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: #dff2ee;
      color: var(--brand-strong);
      font-weight: 900;
    }

    .picker {
      display: grid;
      grid-template-columns: max-content minmax(220px, 1fr);
      gap: 12px;
      align-items: end;
    }

    .source-switch {
      display: inline-flex;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      gap: 4px;
      width: fit-content;
    }

    .source-option {
      min-width: 0;
      min-height: 34px;
      border: 0;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
      background: transparent;
      color: var(--muted);
      padding: 0 12px;
    }

    .source-option.active {
      background: #e9f5f2;
      color: var(--brand-strong);
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .file-input {
      display: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: 0;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: #ffffff;
      padding: 16px;
      overflow: auto;
    }

    .sidebar-head {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 38px;
      gap: 8px;
    }

    .icon-button {
      display: grid;
      place-items: center;
      padding: 0;
      font-weight: 900;
    }

    .sidebar-section {
      display: grid;
      gap: 8px;
    }

    .sidebar-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .run-list {
      display: grid;
      gap: 8px;
    }

    .run-item {
      display: grid;
      gap: 7px;
      width: 100%;
      text-align: left;
      padding: 10px;
      border-radius: 8px;
    }

    .run-item.active {
      border-color: var(--brand);
      background: #edf8f6;
    }

    .run-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 800;
    }

    .run-sub {
      color: var(--muted);
      font-size: 12px;
    }

    .main {
      overflow: auto;
      padding: 18px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .empty {
      min-height: 470px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      border: 1px dashed #b7c5ce;
      border-radius: 8px;
      background: white;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-width: 0;
      box-shadow: var(--shadow);
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .metric-value {
      margin-top: 7px;
      font-size: 20px;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .metric-value-row {
      display: flex;
      gap: 8px;
      align-items: baseline;
      min-width: 0;
    }

    .metric-value-row .metric-value {
      min-width: 0;
    }

    .metric-compact {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .status-ok {
      color: var(--ok);
    }

    .status-bad {
      color: var(--bad);
    }

    .status-warn {
      color: var(--warn);
    }

    .grid-two {
      display: grid;
      grid-template-columns: minmax(350px, 0.75fr) minmax(440px, 1.25fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      font-weight: 850;
      font-size: 15px;
    }

    .panel-body {
      padding: 14px;
      min-width: 0;
    }

    .tabs {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .tab {
      min-height: 32px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
    }

    .tab.active {
      background: #e9f5f2;
      border-color: var(--brand);
      color: var(--brand-strong);
    }

    .chart {
      width: 100%;
      min-height: 280px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(120px, 170px) 1fr auto;
      gap: 10px;
      align-items: center;
      margin: 9px 0;
    }

    .bar-row.detail {
      margin-top: -2px;
      margin-bottom: 7px;
    }

    .bar-row[data-cost-key] {
      cursor: default;
    }

    .bar-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
      font-size: 13px;
    }

    .bar-row.detail .bar-name {
      padding-left: 18px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .bar-track {
      height: 16px;
      background: #edf1f4;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      background: var(--brand);
      min-width: 2px;
    }

    .bar-fill.segment {
      position: absolute;
      top: 0;
      min-width: 0;
    }

    .bar-fill.bunker-detail-0 {
      background: #2f9278;
    }

    .bar-fill.bunker-detail-1 {
      background: #2775b6;
    }

    .bar-fill.bunker-detail-2 {
      background: #8b5fbf;
    }

    .bar-value {
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      min-width: 120px;
      text-align: right;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }

    .kpi-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      background: #fbfcfd;
      min-width: 0;
    }

    .kpi-card.cost {
      background: #f8fbff;
    }

    .kpi-card.operational {
      background: #f8fcfa;
    }

    .kpi-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .kpi-value {
      margin-top: 7px;
      font-size: 20px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .kpi-sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .lane-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
      gap: 8px;
    }

    .lane-pill {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fbfcfd;
    }

    .lane-pill strong {
      display: block;
      font-size: 14px;
    }

    .lane-pill span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .position-declare-grid {
      display: grid;
      gap: 10px;
    }

    .position-declare-row {
      display: grid;
      grid-template-columns: minmax(150px, 220px) 1fr minmax(110px, auto);
      gap: 12px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      padding: 10px;
    }

    .position-declare-title {
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .position-declare-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .position-chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .position-chip {
      min-width: 30px;
      height: 26px;
      display: inline-grid;
      place-items: center;
      border: 1px solid #cbd6dd;
      border-radius: 8px;
      background: white;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .position-chip.selected {
      border-color: var(--brand);
      background: #dff2ee;
      color: var(--brand-strong);
    }

    .position-chip.unavailable {
      opacity: 0.38;
      background: #f0f3f5;
    }

    .position-declare-count {
      text-align: right;
      font-weight: 850;
      white-space: nowrap;
    }

    .algorithm-strip {
      display: grid;
      gap: 10px;
    }

    .algorithm-author-list {
      display: grid;
      gap: 10px;
    }

    .algorithm-author-row {
      display: grid;
      grid-template-columns: minmax(96px, 128px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .algorithm-author {
      display: grid;
      align-content: start;
      gap: 4px;
      border: 0;
      border-right: 3px solid var(--brand);
      border-radius: 0;
      background: transparent;
      padding: 10px 12px 10px 0;
      min-width: 0;
      height: 96px;
      overflow: hidden;
    }

    .algorithm-author-name {
      font-size: 14px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .algorithm-author-best {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .algorithm-row-scroll {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      min-width: 0;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-gutter: stable;
    }

    .algorithm-card {
      display: grid;
      gap: 6px;
      flex: 0 0 230px;
      width: 230px;
      height: 96px;
      min-width: 0;
      align-content: start;
      text-align: left;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      overflow: hidden;
    }

    .algorithm-card.active {
      border-color: var(--brand);
      background: #edf8f6;
    }

    .algorithm-card-name {
      display: block;
      min-width: 0;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.25;
      white-space: normal;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .algorithm-card-meta {
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      white-space: normal;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .timeline-controls {
      display: grid;
      grid-template-columns: minmax(160px, 220px) minmax(130px, 160px) minmax(150px, 180px) minmax(150px, 180px) minmax(220px, 1fr) auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 12px;
    }

    .fit-button {
      min-width: 74px;
      font-weight: 800;
    }

    .zoom-control {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 8px;
      align-items: center;
    }

    .zoom-value {
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      background: var(--idle);
    }

    .timeline {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      max-height: 570px;
    }

    .timeline-grid {
      min-width: 980px;
      transition: min-width 80ms linear;
    }

    .time-axis,
    .vessel-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      border-bottom: 1px solid #edf1f4;
    }

    .timeline-grid.lane-view .time-axis,
    .timeline-grid.lane-view .vessel-row {
      grid-template-columns: 230px 1fr;
    }

    .time-axis {
      position: sticky;
      top: 0;
      background: #fbfcfd;
      z-index: 5;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
    }

    .axis-label,
    .vessel-label {
      position: sticky;
      left: 0;
      z-index: 20;
      background: #ffffff;
      padding: 9px 10px;
      border-right: 1px solid #edf1f4;
      box-shadow: 6px 0 10px rgba(23, 32, 38, 0.04);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .axis-label {
      z-index: 30;
      background: #fbfcfd;
    }

    .lane-label-main {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 850;
    }

    .lane-label-sub {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .axis-track,
    .event-track {
      position: relative;
      min-height: 48px;
      overflow: hidden;
    }

    .virtual-band {
      position: absolute;
      top: 0;
      bottom: 0;
      background: #ead3d6;
      z-index: 0;
      cursor: default;
    }

    .tick {
      position: absolute;
      top: 0;
      bottom: 0;
      border-left: 1px solid #edf1f4;
      pointer-events: none;
    }

    .guide-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      z-index: 1;
      pointer-events: none;
    }

    .guide-line.planning {
      background: rgba(102, 114, 126, 0.45);
    }

    .guide-line.service {
      background: rgba(23, 111, 134, 0.42);
    }

    .guide-label {
      position: absolute;
      top: 2px;
      left: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.78);
      padding: 0 3px;
      border-radius: 3px;
    }

    .tick span {
      position: absolute;
      top: 9px;
      left: 5px;
      white-space: nowrap;
    }

    .event {
      position: absolute;
      top: 18px;
      height: 21px;
      border-radius: 5px;
      min-width: 0;
      color: white;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: default;
    }

    .event.ts-chain-member {
      outline: 2px solid rgba(138, 107, 34, 0.42);
      outline-offset: 1px;
    }

    .event.PORT_STAY {
      background: var(--port);
    }

    .event.INLANE_SAIL,
    .event.sail-in {
      background: var(--sail-in);
    }

    .event.OUTLANE_SAIL,
    .event.sail-out {
      background: var(--sail-out);
    }

    .event.PHASE_IN,
    .event.PHASE_OUT {
      background: var(--phase);
    }

    .event.DRY_DOCK,
    .event.DELIVERY,
    .event.REDELIVERY {
      background: var(--shipyard);
    }

    .event.TRANSSHIPMENT_UNLOAD,
    .event.TRANSSHIPMENT_LOAD {
      background: #8a6b22;
    }

    .event.IDLE {
      background: var(--idle);
    }

    .point-event {
      position: absolute;
      top: 3px;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 1px;
      min-width: 38px;
      color: var(--ink);
      font-size: 10px;
      font-weight: 900;
      cursor: default;
      z-index: 3;
    }

    .point-event.micro-interval {
      top: 18px;
      min-width: 10px;
    }

    .point-event.micro-interval .point-tag,
    .point-event.ts-chain-member .point-tag {
      display: none;
    }

    .point-event.ts-chain-member .point-tag {
      border-color: rgba(138, 107, 34, 0.42);
      background: #fff6d8;
      color: #745600;
    }

    .point-tag {
      padding: 1px 4px;
      border: 1px solid rgba(23, 32, 38, 0.14);
      border-radius: 4px;
      background: white;
      box-shadow: 0 2px 8px rgba(23, 32, 38, 0.08);
      white-space: nowrap;
    }

    .point-pin {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 2px solid white;
      background: var(--phase);
      box-shadow: 0 0 0 1px rgba(23, 32, 38, 0.16);
    }

    .point-event.micro-interval .point-pin {
      width: 4px;
      height: 18px;
      border-radius: 2px;
    }

    .point-event.DELIVERY .point-pin,
    .point-event.REDELIVERY .point-pin {
      background: var(--shipyard);
    }

    .point-event.TRANSSHIPMENT_UNLOAD .point-pin,
    .point-event.TRANSSHIPMENT_LOAD .point-pin {
      background: #8a6b22;
    }

    .chain-band {
      display: none;
    }

    .chain-band::after {
      content: none;
    }

    .chain-callout {
      position: absolute;
      top: 2px;
      transform: translateX(-50%);
      z-index: 4;
      max-width: 78px;
      border: 1px solid rgba(138, 107, 34, 0.32);
      border-radius: 5px;
      background: #fff6d8;
      color: #745600;
      box-shadow: 0 3px 8px rgba(23, 32, 38, 0.1);
      padding: 1px 5px;
      font-size: 10px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: default;
    }

    .canal-callout {
      position: absolute;
      top: 2px;
      transform: translateX(-50%);
      z-index: 4;
      max-width: 72px;
      border: 1px solid rgba(23, 111, 134, 0.28);
      border-radius: 5px;
      background: #e7f4f7;
      color: var(--brand-strong);
      box-shadow: 0 3px 8px rgba(23, 32, 38, 0.08);
      padding: 1px 5px;
      font-size: 10px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: default;
    }

    .tooltip {
      position: fixed;
      z-index: 100;
      width: min(360px, calc(100vw - 24px));
      border: 1px solid #c7d3da;
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      box-shadow: 0 18px 42px rgba(23, 32, 38, 0.18);
      padding: 12px;
      pointer-events: none;
    }

    .tooltip-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 9px;
    }

    .tooltip-status {
      border-radius: 5px;
      padding: 3px 6px;
      background: #edf1f4;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .tooltip-grid {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 6px 10px;
      font-size: 12px;
      line-height: 1.35;
    }

    .tooltip-key {
      color: var(--muted);
      font-weight: 800;
    }

    .tooltip-value {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 650;
    }

    .tooltip-line {
      grid-column: 1 / -1;
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 750;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border-bottom: 1px solid #edf1f4;
      padding: 9px 8px;
      text-align: left;
      vertical-align: top;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      background: #fbfcfd;
    }

    .log-box,
    .json-box {
      margin: 0;
      max-height: 420px;
      overflow: auto;
      background: #101820;
      color: #d7e7ef;
      border-radius: 8px;
      padding: 13px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .hide {
      display: none !important;
    }

    .notice {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      body {
        min-width: 0;
      }

      .topbar,
      .layout,
      .grid-two,
      .summary {
        grid-template-columns: 1fr;
      }

      .picker,
      .timeline-controls {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        max-height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><span class="mark">O</span><span>OCAM Visualizer</span></div>
      <div class="picker">
        <label>Source
          <div id="sourceMode" class="source-switch" role="tablist" aria-label="Source mode">
            <button type="button" class="source-option active" data-source-mode="runs">Runs</button>
            <button type="button" class="source-option" data-source-mode="leaderboard">Leaderboard</button>
          </div>
        </label>
      </div>
      <div class="actions">
        <a href="schedule_table.html" style="font-size:13px;font-weight:700;color:var(--brand);text-decoration:none;margin-right:4px;" title="Schedule Table 보기">📋 Table</a>
        <button id="openDirButton" class="primary" title="outputs 폴더 선택">📂</button>
        <label for="folderInput">
          <button id="fallbackButton" type="button" title="브라우저 폴더 업로드 선택">＋</button>
        </label>
        <input id="folderInput" class="file-input" type="file" webkitdirectory directory multiple>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="search-row">
            <input id="runSearch" type="search" placeholder="260420, virtual, error">
            <button id="refreshButton" class="icon-button" title="다시 읽기">↻</button>
          </div>
          <div id="sourceNotice" class="notice">outputs 선택 대기 중</div>
        </div>
        <section class="sidebar-section">
          <div id="runListLabel" class="sidebar-label">Runs</div>
          <div id="runList" class="run-list"></div>
        </section>
      </aside>

      <main id="main" class="main">
        <section class="empty">
          <div>
            <h1>결과 폴더를 선택하세요</h1>
            <p>상단에서 source 모드를 바꿔 `outputs`의 실행 결과와 `outputs/leaderboard`의 best 결과를 함께 탐색할 수 있습니다.</p>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    const state = {
      sourceMode: "runs",
      sourceName: "",
      directoryHandle: null,
      autoSourceUrl: "",
      runs: [],
      selectedRun: "",
      selectedAlgorithm: "",
      selectedLowerBound: "",
      vesselFilter: "",
      activeTab: "timeline",
      timelineView: "vessel",
      timelineMode: "all",
      sortMode: "vessel",
      timelineZoom: 1.8,
      tooltipEvent: null,
      eventLookup: new Map(),
    };

    const SOURCE_MODES = {
      runs: {
        label: "Runs",
        rootDirName: "outputs",
        groupLabel: "Run",
      },
      leaderboard: {
        label: "Leaderboard",
        rootDirName: "outputs",
        childDirName: "leaderboard",
        groupLabel: "Scenario",
      },
    };

    const els = {
      sourceMode: document.getElementById("sourceMode"),
      openDirButton: document.getElementById("openDirButton"),
      fallbackButton: document.getElementById("fallbackButton"),
      folderInput: document.getElementById("folderInput"),
      refreshButton: document.getElementById("refreshButton"),
      runSearch: document.getElementById("runSearch"),
      sourceNotice: document.getElementById("sourceNotice"),
      runListLabel: document.getElementById("runListLabel"),
      runList: document.getElementById("runList"),
      main: document.getElementById("main"),
    };

    const EVENT_TIME_FIELDS = [
      ["pilot_in_start", "pilot_out_end"],
      ["berthing_start", "berthing_end"],
      ["sea_sail_start", "sea_sail_end"],
      ["phase_in_time", "phase_in_time"],
      ["phase_out_time", "phase_out_time"],
      ["phase_in_start", "phase_in_end"],
      ["phase_out_start", "phase_out_end"],
      ["dock_in", "dock_out"],
      ["dry_dock_start", "dry_dock_end"],
      ["idle_start", "idle_end"],
      ["delivery_time", "delivery_time"],
      ["redelivery_time", "redelivery_time"],
      ["delivery_start", "delivery_end"],
      ["redelivery_start", "redelivery_end"],
      ["unload_start", "unload_end"],
      ["load_start", "load_end"],
    ];

    const CANAL_PORTS = new Set(["PAPCA", "EGSUZ", "EGSCA"]);

    const COST_LABELS = {
      total_cost: "Total Cost",
      bunker_cost: "Bunker Cost",
      bunker_cost_by_inlane_sail: "By InLaneSail",
      bunker_cost_by_port_stay: "By PortStay",
      bunker_cost_by_outlane_sail: "By OutLaneSail",
      canal_fee_cost: "Canal Fee",
      transshipment_cost: "TS Cost",
      opportunity_cost: "Opportunity Cost",
      charter_cost: "Charter cost",
      vessel_cost: "Vessel cost",
      port_cost: "Port cost",
      penalty_cost: "Penalty cost",
    };

    const COST_DESCRIPTIONS = {
      total_cost: "Objective total cost",
      bunker_cost: "Sailing bunker cost from the solution output",
      bunker_cost_by_inlane_sail: "Bunker cost from in-lane sailing events",
      bunker_cost_by_port_stay: "Bunker cost from port stay pilot-in/out time",
      bunker_cost_by_outlane_sail: "Bunker cost from out-lane sailing events",
      canal_fee_cost: "Canal fee from the solution output",
      transshipment_cost: "Transshipment cost from the solution output",
      opportunity_cost: "Virtual vessel opportunity cost from the solution output",
      charter_cost: "Charter-related vessel cost",
      vessel_cost: "Vessel operating cost",
      port_cost: "Port stay cost",
      penalty_cost: "Penalty cost",
    };

    els.sourceMode.querySelectorAll("[data-source-mode]").forEach((button) => {
      button.addEventListener("click", async () => {
        const nextMode = button.dataset.sourceMode;
        if (!nextMode || nextMode === state.sourceMode) return;
        state.sourceMode = nextMode;
        state.directoryHandle = null;
        state.autoSourceUrl = "";
        state.sourceName = "";
        state.runs = [];
        state.selectedRun = "";
        state.selectedAlgorithm = "";
        state.selectedLowerBound = "";
        els.folderInput.value = "";
        setPickerAffordances();
        await initializeSource();
      });
    });
    els.openDirButton.addEventListener("click", openDirectory);
    els.fallbackButton.addEventListener("click", () => els.folderInput.click());
    els.folderInput.addEventListener("change", loadFromFileInput);
    els.refreshButton.addEventListener("click", refreshSource);
    els.runSearch.addEventListener("input", renderRunList);
    setPickerAffordances();
    initializeSource();

    async function initializeSource() {
      setEmptyMessage();
      setSourceNoticeWaiting();
      const restored = await tryLoadSavedDirectory();
      if (restored) return;
      const autoLoaded = await tryLoadRelativeSourceDir();
      if (autoLoaded) return;
    }

    function currentSourceMode() {
      return SOURCE_MODES[state.sourceMode] || SOURCE_MODES.runs;
    }

    function sourceHandleStorageKey() {
      return "outputs_handle";
    }

    function setPickerAffordances() {
      const source = currentSourceMode();
      els.sourceMode.querySelectorAll("[data-source-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.sourceMode === state.sourceMode);
      });
      els.runListLabel.textContent = source.groupLabel === "Scenario" ? "Scenarios" : "Runs";
      els.openDirButton.title = "outputs 폴더 선택";
      els.fallbackButton.title = "outputs 폴더 업로드 선택";
    }

    function setSourceNoticeWaiting() {
      const source = currentSourceMode();
      const target = source.childDirName ? `${source.rootDirName}/${source.childDirName}` : source.rootDirName;
      els.sourceNotice.textContent = `outputs를 선택하세요. ${target}를 자동으로 읽습니다.`;
    }

    async function openDirectory() {
      if (!window.showDirectoryPicker) {
        els.folderInput.click();
        return;
      }
      const handle = await window.showDirectoryPicker({ mode: "read" });
      state.directoryHandle = handle;
      state.autoSourceUrl = "";
      state.sourceName = handle.name;
      await saveDirectoryHandle(handle);
      await loadFromDirectoryHandle(handle);
    }

    async function refreshSource() {
      if (state.directoryHandle) {
        await loadFromDirectoryHandle(state.directoryHandle);
      } else if (state.autoSourceUrl) {
        await loadFromHttpDirectory(state.autoSourceUrl);
      } else if (els.folderInput.files.length) {
        await loadFromFileInput();
      } else {
        await initializeSource();
      }
    }

    async function tryLoadSavedDirectory() {
      if (!("showDirectoryPicker" in window)) return false;
      const handle = await readSavedDirectoryHandle();
      if (!handle) return false;
      const permission = await verifyDirectoryPermission(handle, false);
      if (!permission) return false;
      state.directoryHandle = handle;
      state.autoSourceUrl = "";
      state.sourceName = handle.name;
      await loadFromDirectoryHandle(handle);
      return state.runs.length > 0;
    }

    async function tryLoadRelativeSourceDir() {
      if (location.protocol === "file:") return false;
      const outputUrl = new URL("../outputs/", location.href).href;
      try {
        await loadFromHttpDirectory(outputUrl);
        return state.runs.length > 0;
      } catch {
        return false;
      }
    }

    async function loadFromHttpDirectory(outputUrl) {
      state.directoryHandle = null;
      state.autoSourceUrl = outputUrl;
      state.sourceName = "../outputs";
      const source = currentSourceMode();
      const directoryUrl = source.childDirName ? new URL(`${source.childDirName}/`, outputUrl).href : outputUrl;
      const runUrls = await listDirectoryUrls(directoryUrl, "directory");
      const files = [];
      for (const runUrl of runUrls) {
        const runName = decodeURIComponent(runUrl.pathname.split("/").filter(Boolean).at(-1) || "");
        const fileUrls = await listDirectoryUrls(runUrl.href, "file");
        for (const fileUrl of fileUrls) {
          const fileName = decodeURIComponent(fileUrl.pathname.split("/").pop() || "");
          files.push({
            path: `${runName}/${fileName}`,
            name: fileName,
            runName,
            kind: "result",
            text: async () => {
              const response = await fetch(fileUrl.href);
              if (!response.ok) throw new Error(`failed to fetch ${fileUrl.href}`);
              return response.text();
            },
          });
        }
      }
      if (source.childDirName) {
        try {
          const lowerBoundUrl = new URL("lower_bounds/", outputUrl).href;
          const scenarioUrls = await listDirectoryUrls(lowerBoundUrl, "directory");
          for (const scenarioUrl of scenarioUrls) {
            const runName = decodeURIComponent(scenarioUrl.pathname.split("/").filter(Boolean).at(-1) || "");
            const fileUrls = await listDirectoryUrls(scenarioUrl.href, "file");
            for (const fileUrl of fileUrls) {
              const fileName = decodeURIComponent(fileUrl.pathname.split("/").pop() || "");
              if (!fileName.endsWith(".json")) continue;
              files.push({
                path: `lower_bounds/${runName}/${fileName}`,
                name: fileName,
                runName,
                kind: "lower_bound",
                text: async () => {
                  const response = await fetch(fileUrl.href);
                  if (!response.ok) throw new Error(`failed to fetch ${fileUrl.href}`);
                  return response.text();
                },
              });
            }
          }
        } catch {
          // Lower-bound archive is optional.
        }
      }
      await hydrateRuns(files);
    }

    async function listDirectoryUrls(url, kind) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`directory not found: ${url}`);
      const html = await response.text();
      const doc = new DOMParser().parseFromString(html, "text/html");
      const source = currentSourceMode();
      return Array.from(doc.querySelectorAll("a"))
        .map((anchor) => anchor.getAttribute("href"))
        .filter(Boolean)
        .filter((href) => href !== "../" && href !== "./")
        .map((href) => new URL(href, url))
        .filter((nextUrl) => kind === "directory" ? nextUrl.pathname.endsWith("/") : !nextUrl.pathname.endsWith("/"))
        .filter((nextUrl) => {
          if (kind === "directory") return true;
          return source.childDirName
            ? nextUrl.pathname.endsWith(".json")
            : /_(metadata\.csv|solution\.json|logs\.txt)$/.test(nextUrl.pathname);
        });
    }

    async function saveDirectoryHandle(handle) {
      try {
        const db = await openVisualizerDb();
        await idbSet(db, sourceHandleStorageKey(), handle);
      } catch {
        // Some browsers do not allow storing FileSystem handles, especially in file mode.
      }
    }

    async function readSavedDirectoryHandle() {
      try {
        const db = await openVisualizerDb();
        return await idbGet(db, sourceHandleStorageKey());
      } catch {
        return null;
      }
    }

    async function verifyDirectoryPermission(handle, requestWrite) {
      const options = { mode: requestWrite ? "readwrite" : "read" };
      if ((await handle.queryPermission(options)) === "granted") return true;
      return (await handle.requestPermission(options)) === "granted";
    }

    function openVisualizerDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open("ocam-visualizer", 1);
        request.onupgradeneeded = () => request.result.createObjectStore("handles");
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function idbSet(db, key, value) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction("handles", "readwrite");
        tx.objectStore("handles").put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    function idbGet(db, key) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction("handles", "readonly");
        const request = tx.objectStore("handles").get(key);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function loadFromDirectoryHandle(handle) {
      const files = [];
      const source = currentSourceMode();
      const targetHandle = source.childDirName ? await getChildDirectoryHandle(handle, source.childDirName) : handle;
      if (!targetHandle) {
        await hydrateRuns([]);
        return;
      }
      for await (const [runName, runHandle] of targetHandle.entries()) {
        if (runHandle.kind !== "directory") continue;
        if (!source.childDirName && runName === "leaderboard") continue;
        for await (const [fileName, fileHandle] of runHandle.entries()) {
          if (fileHandle.kind === "file") {
            const file = await fileHandle.getFile();
            files.push({
              path: `${runName}/${fileName}`,
              name: fileName,
              runName,
              kind: "result",
              text: () => file.text(),
            });
            continue;
          }
          if (source.childDirName || fileHandle.kind !== "directory") continue;
          for await (const [nestedFileName, nestedFileHandle] of fileHandle.entries()) {
            if (nestedFileHandle.kind !== "file") continue;
            const file = await nestedFileHandle.getFile();
            files.push({
              path: `${runName}/${fileHandle.name}/${nestedFileName}`,
              name: nestedFileName,
              runName: `${runName} / ${fileHandle.name}`,
              kind: "result",
              text: () => file.text(),
            });
          }
        }
      }
      if (source.childDirName) {
        const lowerBoundHandle = await getChildDirectoryHandle(handle, "lower_bounds");
        if (lowerBoundHandle) {
          for await (const [scenarioName, scenarioHandle] of lowerBoundHandle.entries()) {
            if (scenarioHandle.kind !== "directory") continue;
            for await (const [fileName, fileHandle] of scenarioHandle.entries()) {
              if (fileHandle.kind !== "file" || !fileName.endsWith(".json")) continue;
              const file = await fileHandle.getFile();
              files.push({
                path: `lower_bounds/${scenarioName}/${fileName}`,
                name: fileName,
                runName: scenarioName,
                kind: "lower_bound",
                text: () => file.text(),
              });
            }
          }
        }
      }
      await hydrateRuns(files);
    }

    async function loadFromFileInput() {
      const inputFiles = Array.from(els.folderInput.files || []);
      if (!inputFiles.length) return;
      state.directoryHandle = null;
      state.autoSourceUrl = "";
      state.sourceName = inputFiles[0].webkitRelativePath.split("/")[0] || "outputs";
      const source = currentSourceMode();
      const files = inputFiles.map((file) => {
        const rel = file.webkitRelativePath || file.name;
        const parts = rel.split("/");
        const isLowerBound = parts[1] === "lower_bounds";
        let runName = parts.length >= 3 ? parts[1] : parts[0];
        if (!source.childDirName && parts.length >= 4) {
          runName = `${parts[1]} / ${parts[2]}`;
        }
        if (source.childDirName) {
          runName = parts.length >= 4 && parts[1] === source.childDirName ? parts[2] : "";
          if (isLowerBound && parts.length >= 4) runName = parts[2];
        }
        if (!source.childDirName && parts[1] === "leaderboard") {
          runName = "";
        }
        if (!source.childDirName && isLowerBound) {
          runName = "";
        }
        return {
          path: parts.slice(1).join("/") || file.name,
          name: file.name,
          runName,
          kind: isLowerBound ? "lower_bound" : "result",
          text: () => file.text(),
        };
      }).filter((file) => file.runName);
      await hydrateRuns(files);
    }

    async function getChildDirectoryHandle(handle, childDirName) {
      try {
        return await handle.getDirectoryHandle(childDirName);
      } catch {
        return null;
      }
    }

    async function hydrateRuns(files) {
      const byRun = new Map();
      const isLeaderboardMode = Boolean(currentSourceMode().childDirName);
      for (const file of files) {
        if (file.kind === "lower_bound") {
          if (!byRun.has(file.runName)) {
            byRun.set(file.runName, { name: file.runName, algorithms: new Map(), lowerBounds: new Map() });
          }
          const run = byRun.get(file.runName);
          try {
            const payload = JSON.parse(await file.text());
            const lowerBound = parseLowerBoundPayload(payload, file.name);
            const existing = run.lowerBounds.get(lowerBound.key);
            lowerBound.files = { ...(existing?.files || {}), lowerBound: file.path };
            lowerBound.logs = lowerBound.logs || existing?.logs || "";
            lowerBound.metadata = { ...(existing?.metadata || {}), ...lowerBound.metadata };
            run.lowerBounds.set(lowerBound.key, lowerBound);
          } catch (error) {
            const key = file.name.replace(/\.json$/, "");
            run.lowerBounds.set(key, {
              key,
              displayName: key.replace("_", "/"),
              status: "error",
              lowerBound: null,
              metadata: { error_type: "LowerBoundParseError", error_message: error.message },
              files: { lowerBound: file.path },
            });
          }
          continue;
        }
        if (isLeaderboardMode) {
          if (!file.name.endsWith(".json")) continue;
          if (!byRun.has(file.runName)) {
            byRun.set(file.runName, { name: file.runName, algorithms: new Map(), lowerBounds: new Map() });
          }
          const run = byRun.get(file.runName);
          let payload;
          try {
            payload = JSON.parse(await file.text());
          } catch (error) {
            const algorithmKey = file.name.replace(/\.json$/, "");
            run.algorithms.set(algorithmKey, {
              key: algorithmKey,
              displayName: algorithmKey.replace("_", "/"),
              metadata: { status: "error", error_type: "LeaderboardParseError", error_message: error.message, objectiveParsed: null },
              solution: null,
              solutionError: error.message,
              logs: "",
              files: { leaderboard: file.path },
            });
            continue;
          }
          const algorithmName = typeof payload.algorithm === "string" && payload.algorithm ? payload.algorithm : file.name.replace(/\.json$/, "").replace("_", "/");
          const algorithmKey = algorithmName.replace("/", "_");
          const metadata = payload.metadata && typeof payload.metadata === "object" ? { ...payload.metadata } : {};
          metadata.algorithm = algorithmName;
          metadata.status = payload.status ?? metadata.status ?? "";
          metadata.objectiveParsed = payload.objective && typeof payload.objective === "object" ? payload.objective : parseObjectiveFromMetadata(metadata);
          run.algorithms.set(algorithmKey, {
            key: algorithmKey,
            displayName: algorithmName,
            metadata,
            solution: payload.solution && typeof payload.solution === "object" ? payload.solution : null,
            solutionError: typeof payload.solution === "object" ? "" : undefined,
            logs: typeof payload.logs === "string" ? payload.logs : "",
            files: { leaderboard: file.path },
          });
          continue;
        }

        if (file.name.match(/_lower_bound_(metadata\.csv|logs\.txt)$/)) {
          if (!byRun.has(file.runName)) {
            byRun.set(file.runName, { name: file.runName, algorithms: new Map(), lowerBounds: new Map() });
          }
          const run = byRun.get(file.runName);
          const key = file.name.replace(/_lower_bound_(metadata\.csv|logs\.txt)$/, "");
          if (!run.lowerBounds.has(key)) {
            run.lowerBounds.set(key, {
              key,
              displayName: key.replace("_", "/"),
              status: "",
              lowerBound: null,
              objective: null,
              metadata: {},
              logs: "",
              files: {},
            });
          }
          const lowerBound = run.lowerBounds.get(key);
          if (file.name.endsWith("_lower_bound_metadata.csv")) {
            lowerBound.metadata = { ...lowerBound.metadata, ...parseMetadataCsv(await file.text()) };
            lowerBound.files.metadata = file.path;
            if (lowerBound.metadata.algorithm) {
              lowerBound.displayName = lowerBound.metadata.algorithm;
              lowerBound.key = lowerBound.metadata.algorithm.replace("/", "_");
            }
            if (!isGurobiStatusCode(lowerBound.metadata.status)) {
              lowerBound.status = lowerBound.metadata.status || lowerBound.status;
            }
            lowerBound.lowerBound = parseNumber(lowerBound.metadata.lower_bound) ?? lowerBound.lowerBound;
          } else {
            lowerBound.logs = await file.text();
            lowerBound.files.logs = file.path;
          }
          continue;
        }

        if (file.name.endsWith("_lower_bound.json")) {
          if (!byRun.has(file.runName)) {
            byRun.set(file.runName, { name: file.runName, algorithms: new Map(), lowerBounds: new Map() });
          }
          const run = byRun.get(file.runName);
          try {
            const payload = JSON.parse(await file.text());
            const lowerBound = parseLowerBoundPayload(payload, file.name.replace(/_lower_bound\.json$/, ".json"));
            const existing = run.lowerBounds.get(lowerBound.key);
            lowerBound.files = { ...(existing?.files || {}), lowerBound: file.path };
            lowerBound.logs = lowerBound.logs || existing?.logs || "";
            lowerBound.metadata = { ...(existing?.metadata || {}), ...lowerBound.metadata };
            run.lowerBounds.set(lowerBound.key, lowerBound);
          } catch (error) {
            const key = file.name.replace(/_lower_bound\.json$/, "");
            run.lowerBounds.set(key, {
              key,
              displayName: key.replace("_", "/"),
              status: "error",
              lowerBound: null,
              metadata: { error_type: "LowerBoundParseError", error_message: error.message },
              files: { lowerBound: file.path },
            });
          }
          continue;
        }
        if (!file.name.match(/_(metadata\.csv|solution\.json|logs\.txt)$/)) continue;
        if (!byRun.has(file.runName)) {
          byRun.set(file.runName, { name: file.runName, algorithms: new Map(), lowerBounds: new Map() });
        }
        const run = byRun.get(file.runName);
        const match = file.name.match(/^(.+)_(metadata\.csv|solution\.json|logs\.txt)$/);
        if (!match) continue;
        const algorithmKey = match[1];
        if (!run.algorithms.has(algorithmKey)) {
          run.algorithms.set(algorithmKey, {
            key: algorithmKey,
            displayName: algorithmKey.replace("_", "/"),
            metadata: null,
            solution: null,
            logs: "",
            files: {},
          });
        }
        const algorithm = run.algorithms.get(algorithmKey);
        if (file.name.endsWith("_metadata.csv")) {
          algorithm.metadata = parseMetadataCsv(await file.text());
          algorithm.files.metadata = file.path;
          if (algorithm.metadata.algorithm) algorithm.displayName = algorithm.metadata.algorithm;
        } else if (file.name.endsWith("_solution.json")) {
          try {
            algorithm.solution = JSON.parse(await file.text());
          } catch (error) {
            algorithm.solutionError = error.message;
          }
          algorithm.files.solution = file.path;
        } else if (file.name.endsWith("_logs.txt")) {
          algorithm.logs = await file.text();
          algorithm.files.logs = file.path;
        }
      }

      state.runs = Array.from(byRun.values())
        .map((run) => ({
          ...run,
          algorithms: Array.from(run.algorithms.values()).sort(byAlgorithmOrder),
          lowerBounds: Array.from(run.lowerBounds?.values() || []).sort(compareLowerBounds),
        }))
        .filter((run) => run.algorithms.length || run.lowerBounds.length)
        .sort((a, b) => isLeaderboardMode
          ? a.name.localeCompare(b.name, undefined, { numeric: true })
          : b.name.localeCompare(a.name, undefined, { numeric: true }));

      state.selectedRun = state.runs[0]?.name || "";
      state.selectedAlgorithm = bestAlgorithmKey(state.runs[0]) || "";
      state.selectedLowerBound = bestLowerBoundKey(state.runs[0]) || "";
      els.sourceNotice.textContent = `${state.sourceName}: ${state.runs.length} ${currentSourceMode().groupLabel.toLowerCase()}s`;
      renderAll();
    }

    function setEmptyMessage() {
      const fileMode = location.protocol === "file:";
      const source = currentSourceMode();
      els.main.innerHTML = `
        <section class="empty">
          <div>
            <h1>결과 폴더를 선택하세요</h1>
            <p>${fileMode
              ? `브라우저 보안 정책상 로컬 HTML은 주변 폴더를 자동 스캔할 수 없습니다. ${source.rootDirName}을 한 번 선택하면 지원 브라우저에서 다음 실행부터 자동 재연결을 시도합니다.`
              : `상단의 폴더 버튼으로 outputs를 선택하세요. 지원 브라우저에서는 선택한 폴더를 기억합니다.`}</p>
          </div>
        </section>
      `;
    }

    function byAlgorithmName(a, b) {
      return a.displayName.localeCompare(b.displayName, undefined, { numeric: true });
    }

    function byAlgorithmOrder(a, b) {
      if (!currentSourceMode().childDirName) return byAlgorithmName(a, b);
      return compareNullableNumber(algorithmVirtualVessels(a), algorithmVirtualVessels(b))
        || compareNullableNumber(algorithmTotalCost(a), algorithmTotalCost(b))
        || byAlgorithmName(a, b);
    }

    function compareNullableNumber(a, b) {
      const aNumber = typeof a === "number" && Number.isFinite(a);
      const bNumber = typeof b === "number" && Number.isFinite(b);
      if (aNumber && bNumber) return a - b;
      if (aNumber) return -1;
      if (bNumber) return 1;
      return 0;
    }

    function algorithmVirtualVessels(algorithm) {
      const objective = algorithm.metadata?.objectiveParsed || {};
      return firstFiniteNumber([
        objective.num_virtual_vessels,
        objective.num_virtual_vessels_used,
        algorithm.metadata?.num_virtual_vessels,
        algorithm.metadata?.num_virtual_vessels_used,
        solutionVirtualVessels(algorithm.solution),
      ]);
    }

    function algorithmTotalCost(algorithm) {
      return firstFiniteNumber([
        algorithm.metadata?.objectiveParsed?.total_cost,
        algorithm.metadata?.total_cost,
      ]);
    }

    function solutionVirtualVessels(solution) {
      if (!solution || typeof solution !== "object") return null;
      const virtual = solution.virtual_vessel_schedules || {};
      const virtualCount = Object.keys(virtual).length;
      return virtualCount || Number(solution.num_virtual_vessels_used || 0);
    }

    function firstFiniteNumber(values) {
      for (const value of values) {
        const number = parseNumber(value);
        if (number !== null) return number;
      }
      return null;
    }

    function parseMetadataCsv(text) {
      const rows = parseCsv(text);
      const metadata = {};
      for (const row of rows.slice(1)) {
        if (row.length < 2 || !row[0]) continue;
        const key = row[0];
        const value = row.slice(1).join(",");
        if (key === "status" && metadata.status !== undefined) {
          metadata.model_status = value;
          continue;
        }
        metadata[key] = value;
      }
      metadata.objectiveParsed = parseObjectiveFromMetadata(metadata);
      return metadata;
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let field = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"' && inQuotes && next === '"') {
          field += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(field);
          field = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(field);
          rows.push(row);
          row = [];
          field = "";
        } else {
          field += char;
        }
      }
      if (field || row.length) {
        row.push(field);
        rows.push(row);
      }
      return rows;
    }

    function parseObjective(value) {
      if (!value || value === "None" || value === "null") return null;
      const trimmed = value.trim();
      if (/^-?\d+(\.\d+)?$/.test(trimmed)) return { total_cost: Number(trimmed) };
      try {
        return JSON.parse(trimmed);
      } catch {
        try {
          return JSON.parse(trimmed.replaceAll("'", '"'));
        } catch {
          return null;
        }
      }
    }

    function parseLowerBoundPayload(payload, fileName) {
      const algorithmName = typeof payload.algorithm === "string" && payload.algorithm
        ? payload.algorithm
        : fileName.replace(/\.json$/, "").replace("_", "/");
      const metadata = payload.metadata && typeof payload.metadata === "object" ? { ...payload.metadata } : {};
      metadata.algorithm = algorithmName;
      metadata.status = payload.status ?? metadata.status ?? "";
      const lowerBound = parseNumber(payload.lower_bound);
      return {
        key: algorithmName.replace("/", "_"),
        displayName: algorithmName,
        status: payload.status ?? metadata.status ?? "",
        lowerBound,
        objective: payload.objective && typeof payload.objective === "object" ? payload.objective : null,
        metadata,
        logs: typeof payload.logs === "string" ? payload.logs : "",
      };
    }

    function compareLowerBounds(a, b) {
      const aValue = typeof a.lowerBound === "number" ? a.lowerBound : -Infinity;
      const bValue = typeof b.lowerBound === "number" ? b.lowerBound : -Infinity;
      return bValue - aValue || a.displayName.localeCompare(b.displayName, undefined, { numeric: true });
    }

    function parseObjectiveFromMetadata(metadata) {
      const parsed = parseObjective(metadata.objective);
      const objective = parsed && typeof parsed === "object" ? { ...parsed } : {};
      for (const key of objectiveMetadataKeys(metadata)) {
        const value = parseNumber(metadata[key]);
        if (value !== null) objective[key] = value;
      }
      return Object.keys(objective).length ? objective : null;
    }

    function objectiveMetadataKeys(metadata) {
      const preferred = [
        "total_cost",
        "bunker_cost",
        "canal_fee_cost",
        "transshipment_cost",
        "opportunity_cost",
        "charter_cost",
        "vessel_cost",
        "port_cost",
        "penalty_cost",
        "actual_port_calls",
        "total_port_calls",
        "service_lane_coverage_rate",
        "vessel_service_days",
        "vessel_available_days",
        "vessel_drydock_days",
        "vessel_utilization_rate",
        "slot_utilization_required_teu_days",
        "slot_utilization_deployed_teu_days",
        "slot_utilization_rate",
        "bunker_cost_by_inlane_sail",
        "bunker_cost_by_port_stay",
        "bunker_cost_by_outlane_sail",
        "transshipment_count",
      ];
      const keys = Object.keys(metadata);
      const costKeys = keys.filter((key) => key.endsWith("_cost") || key.endsWith("_costs"));
      return [...new Set([...preferred, ...costKeys])].filter((key) => key in metadata);
    }

    function parseNumber(value) {
      if (value === undefined || value === null || value === "") return null;
      const normalized = String(value).replaceAll(",", "").trim();
      if (!/^-?\d+(\.\d+)?([eE][+-]?\d+)?$/.test(normalized)) return null;
      const number = Number(normalized);
      return Number.isFinite(number) ? number : null;
    }

    function renderAll() {
      renderRunList();
      renderMain();
    }

    function renderRunList() {
      const query = els.runSearch.value.trim().toLowerCase();
      const runs = state.runs.filter((run) => runMatches(run, query));
      els.runList.innerHTML = runs.map((run) => {
        const stats = runStats(run);
        const cls = run.name === state.selectedRun ? "run-item active" : "run-item";
        const countText = stats.total ? `${stats.ok}/${stats.total}` : `LB ${stats.lbOk}/${stats.lowerBoundCount}`;
        return `
          <button class="${cls}" data-run="${escapeHtml(run.name)}">
            <span class="run-title">
              <span>${escapeHtml(run.name)}</span>
              <span class="${stats.errors ? "status-bad" : "status-ok"}">${escapeHtml(countText)}</span>
            </span>
            <span class="run-sub">${escapeHtml(stats.algorithms)}</span>
          </button>
        `;
      }).join("");
      els.runList.querySelectorAll("[data-run]").forEach((button) => {
        button.addEventListener("click", () => selectRun(button.dataset.run));
      });
    }

    function runMatches(run, query) {
      if (!query) return true;
      const haystack = [
        run.name,
        ...run.algorithms.flatMap((algorithm) => [
          algorithm.displayName,
          algorithm.metadata?.status,
          algorithm.metadata?.error_type,
          algorithm.metadata?.error_message,
        ]),
        ...(run.lowerBounds || []).flatMap((lowerBound) => [
          lowerBound.displayName,
          lowerBound.status,
          lowerBound.metadata?.status,
          lowerBound.metadata?.error_type,
          lowerBound.metadata?.error_message,
        ]),
      ].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function runStats(run) {
      const total = run.algorithms.length;
      const ok = run.algorithms.filter((algorithm) => isOk(algorithm)).length;
      const names = run.algorithms.map((algorithm) => algorithm.displayName).join(", ");
      const lowerBoundCount = run.lowerBounds?.length || 0;
      const lbOk = (run.lowerBounds || []).filter((lowerBound) => lowerBoundIsOk(lowerBound)).length;
      const suffix = lowerBoundCount ? `${names}${names ? " · " : ""}LB ${lowerBoundCount}` : names;
      return { total, ok, errors: total - ok, lowerBoundCount, lbOk, algorithms: suffix };
    }

    function selectRun(runName) {
      state.selectedRun = runName;
      if (isLeaderboardMode()) {
        state.selectedAlgorithm = bestAlgorithmKey(getSelectedRun()) || "";
      }
      state.selectedLowerBound = bestLowerBoundKey(getSelectedRun()) || "";
      renderRunList();
      renderMain();
    }

    function selectAlgorithm(algorithmKey) {
      state.selectedAlgorithm = algorithmKey;
      renderMain();
    }

    function selectLowerBound(lowerBoundKey) {
      state.selectedLowerBound = lowerBoundKey;
      renderMain();
    }

    function renderMain() {
      const run = getSelectedRun();
      if (!run) {
        const source = currentSourceMode();
        const target = source.childDirName ? `outputs/${source.childDirName}` : "outputs";
        els.main.innerHTML = `<section class="empty"><div><h1>표시할 결과가 없습니다</h1><p>metadata, solution, logs 파일이 있는 ${escapeHtml(target)}을 확인하세요.</p></div></section>`;
        return;
      }
      const algorithms = run.algorithms || [];
      if (!algorithms.some((item) => item.key === state.selectedAlgorithm)) {
        state.selectedAlgorithm = bestAlgorithmKey(run) || "";
      }
      if (!(run.lowerBounds || []).some((item) => item.key === state.selectedLowerBound)) {
        state.selectedLowerBound = bestLowerBoundKey(run) || "";
      }
      const algorithm = getSelectedAlgorithm();
      if (!algorithm) {
        if ((run.lowerBounds || []).length) {
          const lowerBound = getSelectedLowerBound() || run.lowerBounds[0];
          els.main.innerHTML = `
            ${renderAlgorithmStrip(run)}
            ${renderLowerBoundSummary(run, lowerBound)}
            ${renderLowerBoundDetailsPanel(lowerBound)}
          `;
          bindMainEvents();
          bindAlgorithmStrip();
          return;
        }
        els.main.innerHTML = `<section class="empty"><div><h1>표시할 결과가 없습니다</h1><p>선택된 ${escapeHtml(currentSourceMode().groupLabel.toLowerCase())}에 algorithm이 없습니다.</p></div></section>`;
        return;
      }

      const analysis = analyzeSolution(algorithm.solution);
      els.main.innerHTML = `
        ${renderAlgorithmStrip(run)}
        ${renderSummary(run, algorithm, analysis)}
        ${renderRuntimeHistoryPanel(algorithm)}
        ${renderKpiPanel(algorithm, analysis)}
        <section class="grid-two">
          ${renderCostPanel(algorithm, analysis)}
          ${renderLanePanel(analysis)}
        </section>
        ${renderPositionDeclarationPanel(run, algorithm)}
        ${renderTimelinePanel(algorithm, analysis)}
        ${renderDetailsPanel(algorithm, analysis)}
      `;
      bindMainEvents();
      bindAlgorithmStrip();
    }

    function renderAlgorithmStrip(run) {
      const authorRows = buildAlgorithmAuthorRows(run.algorithms);
      const lowerBounds = run.lowerBounds || [];
      return `
        <section class="panel algorithm-strip">
          <div class="panel-head">
            <div class="panel-title">Algorithms</div>
          </div>
          <div class="panel-body">
            <div class="algorithm-author-list">
              ${authorRows.map((row) => `
                <div class="algorithm-author-row">
                  <div class="algorithm-author">
                    <div class="algorithm-author-name">${escapeHtml(row.author)}</div>
                    <div class="algorithm-author-best">best #Virtual ${escapeHtml(formatScoreVirtual(row.bestScore))}<br>cost ${escapeHtml(formatScoreCost(row.bestScore))}</div>
                  </div>
                  <div class="algorithm-row-scroll">
                    ${row.algorithms.map((algorithm) => renderAlgorithmCard(algorithm)).join("")}
                  </div>
                </div>
              `).join("")}
              ${lowerBounds.length ? `
                <div class="algorithm-author-row">
                  <div class="algorithm-author">
                    <div class="algorithm-author-name">Lower Bounds</div>
                    <div class="algorithm-author-best">best LB ${escapeHtml(formatCompact(lowerBounds[0].lowerBound))}<br>${escapeHtml(lowerBounds.length)} recorded</div>
                  </div>
                  <div class="algorithm-row-scroll">
                    ${lowerBounds.map((lowerBound) => renderLowerBoundCard(lowerBound)).join("")}
                  </div>
                </div>
              ` : ""}
            </div>
          </div>
        </section>
      `;
    }

    function renderAlgorithmCard(algorithm) {
      const score = algorithmScore(algorithm);
      const statusText = readableStatus(algorithm);
      const active = algorithm.key === state.selectedAlgorithm ? "algorithm-card active" : "algorithm-card";
      return `
        <button class="${active}" data-main-algorithm="${escapeHtml(algorithm.key)}">
          <span class="algorithm-card-name">${escapeHtml(algorithm.displayName)}</span>
          <span class="algorithm-card-meta">${escapeHtml(statusText)} · objective ${escapeHtml(formatScoreCost(score))} · #Virtual ${escapeHtml(formatScoreVirtual(score))}</span>
        </button>
      `;
    }

    function renderLowerBoundCard(lowerBound) {
      const active = lowerBound.key === state.selectedLowerBound ? "algorithm-card active" : "algorithm-card";
      const statusText = readableLowerBoundStatus(lowerBound);
      return `
        <button class="${active}" data-lower-bound="${escapeHtml(lowerBound.key)}">
          <span class="algorithm-card-name">${escapeHtml(lowerBound.displayName)}</span>
          <span class="algorithm-card-meta">${escapeHtml(statusText)} · lower bound ${escapeHtml(formatCompact(lowerBound.lowerBound))}</span>
        </button>
      `;
    }

    function buildAlgorithmAuthorRows(algorithms) {
      const byAuthor = new Map();
      for (const algorithm of algorithms) {
        const author = algorithmAuthor(algorithm);
        if (!byAuthor.has(author)) byAuthor.set(author, []);
        byAuthor.get(author).push(algorithm);
      }
      return Array.from(byAuthor.entries())
        .map(([author, authorAlgorithms]) => {
          const sorted = [...authorAlgorithms].sort(compareAlgorithmsByQuality);
          return { author, algorithms: sorted, bestScore: algorithmScore(sorted[0]) };
        })
        .sort((a, b) => compareScores(a.bestScore, b.bestScore) || a.author.localeCompare(b.author, undefined, { numeric: true }));
    }

    function bestAlgorithmKey(run) {
      return buildAlgorithmAuthorRows(run?.algorithms || [])[0]?.algorithms[0]?.key || "";
    }

    function bestLowerBoundKey(run) {
      return [...(run?.lowerBounds || [])].sort(compareLowerBounds)[0]?.key || "";
    }

    function getSelectedLowerBound() {
      return getSelectedRun()?.lowerBounds?.find((lowerBound) => lowerBound.key === state.selectedLowerBound) || null;
    }

    function isLeaderboardMode() {
      return Boolean(currentSourceMode().childDirName);
    }

    function algorithmAuthor(algorithm) {
      const name = algorithm.displayName || algorithm.key || "";
      return name.split(/[\/_]/)[0] || "unknown";
    }

    function compareAlgorithmsByQuality(a, b) {
      return compareScores(algorithmScore(a), algorithmScore(b))
        || a.displayName.localeCompare(b.displayName, undefined, { numeric: true });
    }

    function compareScores(a, b) {
      return a.virtual - b.virtual || a.cost - b.cost;
    }

    function algorithmScore(algorithm) {
      const objective = algorithm.metadata?.objectiveParsed || {};
      const cost = typeof objective.total_cost === "number" ? objective.total_cost : Infinity;
      const virtual = firstDefinedNumber(objective, ["num_virtual_vessels"])
        ?? solutionVirtualCount(algorithm.solution)
        ?? Infinity;
      return { virtual, cost };
    }

    function solutionVirtualCount(solution) {
      if (!solution || typeof solution !== "object") return null;
      if (solution.virtual_vessel_schedules && typeof solution.virtual_vessel_schedules === "object") {
        return Object.keys(solution.virtual_vessel_schedules).length;
      }
      if (Number.isFinite(Number(solution.num_virtual_vessels_used))) return Number(solution.num_virtual_vessels_used);
      return null;
    }

    function formatScoreVirtual(score) {
      return Number.isFinite(score.virtual) ? formatNumber(score.virtual) : "n/a";
    }

    function formatScoreCost(score) {
      return Number.isFinite(score.cost) ? formatCompact(score.cost) : "n/a";
    }

    function bindAlgorithmStrip() {
      els.main.querySelectorAll("[data-main-algorithm]").forEach((button) => {
        button.addEventListener("click", () => selectAlgorithm(button.dataset.mainAlgorithm));
      });
      els.main.querySelectorAll("[data-lower-bound]").forEach((button) => {
        button.addEventListener("click", () => selectLowerBound(button.dataset.lowerBound));
      });
    }

    function renderSummary(run, algorithm, analysis) {
      const metadata = algorithm.metadata || {};
      const objective = metadata.objectiveParsed || {};
      const statusClass = isOk(algorithm) ? "status-ok" : "status-bad";
      const lowerBound = getSelectedLowerBound();
      const virtualVessels = algorithmVirtualVessels(algorithm);
      const gapInvalid = lowerBound && virtualVessels !== null && virtualVessels !== 0;
      const gap = computeGap(objective.total_cost, lowerBound?.lowerBound);
      const gapTooltip = gapInvalid ? "LB는 가상선박이 0인 인스턴스에 대해서만 유효합니다." : "";
      return `
        <section class="summary">
          ${metric(currentSourceMode().groupLabel, run.name)}
          ${metric("Algorithm", algorithm.displayName)}
          ${metric("Status", readableStatus(algorithm), statusClass)}
          ${metric("Objective", formatNumber(objective.total_cost), "", compactObjective(objective.total_cost))}
          ${metric(
            "Gap",
            gapInvalid ? "invalid" : (gap ? formatPercent(gap.percent) : "n/a"),
            gapInvalid || (gap && gap.absolute < -1e-6) ? "status-bad" : "",
            gapInvalid ? "" : (gap ? formatUsd(gap.absolute) : ""),
            gapTooltip,
          )}
          ${metric("Vessels", formatNumber(analysis.realVessels))}
          ${metric("Virtual", formatNumber(analysis.virtualVessels))}
        </section>
      `;
    }

    function renderLowerBoundSummary(run, lowerBound) {
      const metadata = lowerBound?.metadata || {};
      const objective = lowerBound?.objective || {};
      const runtime = firstDefinedNumber(metadata, ["elapsed_seconds", "runtime_seconds", "algorithm_runtime_seconds"]);
      const status = readableLowerBoundStatus(lowerBound);
      const statusClass = lowerBoundIsOk(lowerBound) ? "status-ok" : "status-bad";
      return `
        <section class="summary">
          ${metric(currentSourceMode().groupLabel, run.name)}
          ${metric("Result", lowerBound?.displayName || "-")}
          ${metric("Status", status, statusClass)}
          ${metric("Bound", formatNumber(lowerBound?.lowerBound), "", compactObjective(lowerBound?.lowerBound))}
          ${metric("MIP Gap", formatPercent(firstDefinedNumber(objective, ["mip_gap"])))}
          ${metric("Runtime", runtime === null ? "n/a" : `${formatNumber(runtime)} sec`)}
        </section>
      `;
    }

    function renderLowerBoundDetailsPanel(lowerBound) {
      const metadataRows = Object.entries(lowerBound?.metadata || {})
        .filter(([key]) => key !== "objectiveParsed")
        .map(([key, value]) => `<tr><td title="${escapeHtml(key)}">${escapeHtml(key)}</td><td title="${escapeHtml(value)}">${escapeHtml(value)}</td></tr>`)
        .join("");
      return `
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Lower Bound Details</div>
          </div>
          <div class="panel-body">
            <table>
              <tbody>
                <tr><th>Algorithm</th><td>${escapeHtml(lowerBound?.displayName || "-")}</td></tr>
                <tr><th>Bound</th><td>${escapeHtml(formatNumber(lowerBound?.lowerBound))}</td></tr>
                <tr><th>Status</th><td>${escapeHtml(readableLowerBoundStatus(lowerBound))}</td></tr>
              </tbody>
            </table>
          </div>
        </section>
        <section class="panel">
          <div class="panel-head"><div class="panel-title">Metadata</div></div>
          <div class="panel-body">
            <table><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>${metadataRows || `<tr><td colspan="2">metadata 정보 없음</td></tr>`}</tbody></table>
          </div>
        </section>
        <section class="panel">
          <div class="panel-head"><div class="panel-title">Logs</div></div>
          <div class="panel-body">
            <pre class="log-box">${escapeHtml(lowerBound?.logs || "logs 정보 없음")}</pre>
          </div>
        </section>
      `;
    }

    function computeGap(objectiveValue, lowerBoundValue) {
      if (typeof objectiveValue !== "number" || typeof lowerBoundValue !== "number") return null;
      const absolute = objectiveValue - lowerBoundValue;
      const percent = absolute / Math.max(1, Math.abs(objectiveValue));
      return { absolute, percent };
    }

    function renderRuntimeHistoryPanel(algorithm) {
      const history = parseRuntimeHistory(algorithm.metadata?.leaderboard_runtime_history);
      if (!history.length) return "";
      const values = history
        .map((item) => parseNumber(item.elapsed_seconds))
        .filter((value) => value !== null);
      const minValue = values.length ? Math.min(...values) : null;
      const maxValue = values.length ? Math.max(...values) : null;
      return `
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Leaderboard Runtime History</div>
          </div>
          <div class="panel-body">
            <table>
              <thead><tr><th>Run</th><th>Elapsed</th><th>Recorded</th></tr></thead>
              <tbody>
                ${history.map((item) => {
                  const elapsed = parseNumber(item.elapsed_seconds);
                  const width = elapsed !== null && maxValue !== null && maxValue > 0
                    ? Math.max(3, (elapsed / maxValue) * 100)
                    : 0;
                  const label = elapsed === null ? "n/a" : `${formatNumber(elapsed)} sec`;
                  const cls = elapsed !== null && minValue !== null && elapsed === minValue ? "status-ok" : "";
                  return `
                    <tr>
                      <td>${escapeHtml(item.run || "-")}</td>
                      <td>
                        <div class="cost-bar-row">
                          <span class="${cls}">${escapeHtml(label)}</span>
                          <span class="cost-bar-track"><span class="cost-bar-fill" style="width:${width}%"></span></span>
                        </div>
                      </td>
                      <td>${escapeHtml(item.recorded_at || "-")}</td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function parseRuntimeHistory(value) {
      if (Array.isArray(value)) return value.filter((item) => item && typeof item === "object");
      if (typeof value !== "string" || !value.trim()) return [];
      try {
        const parsed = JSON.parse(value);
        return Array.isArray(parsed) ? parsed.filter((item) => item && typeof item === "object") : [];
      } catch {
        return [];
      }
    }

    function metric(label, value, cls = "", secondary = "", tooltip = "") {
      const tooltipAttr = tooltip ? ` data-text-tooltip="${escapeHtml(tooltip)}"` : "";
      return `
        <div class="metric"${tooltipAttr}>
          <div class="metric-label">${escapeHtml(label)}</div>
          <div class="${secondary ? "metric-value-row" : ""}">
            <div class="metric-value ${cls}">${escapeHtml(value ?? "-")}</div>
            ${secondary ? `<div class="metric-compact">${escapeHtml(secondary)}</div>` : ""}
          </div>
        </div>
      `;
    }

    function compactObjective(value) {
      return typeof value === "number" ? `(${formatCompact(value)})` : "";
    }

    function renderKpiPanel(algorithm, analysis) {
      const kpis = buildKpis(algorithm, analysis);
      return `
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">KPI Summary</div>
          </div>
          <div class="panel-body">
            <div class="kpi-grid">
              ${kpis.map((kpi) => `
                <div class="kpi-card ${escapeHtml(kpi.group)}">
                  <div class="kpi-label" title="${escapeHtml(kpi.label)}">${escapeHtml(kpi.label)}</div>
                  <div class="kpi-value">${escapeHtml(kpi.value)}</div>
                  <div class="kpi-sub">${escapeHtml(kpi.note)}</div>
                </div>
              `).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function buildKpis(algorithm, analysis) {
      const objective = algorithm.metadata?.objectiveParsed || {};
      const metadata = algorithm.metadata || {};
      const opportunity = firstDefinedNumber(objective, ["opportunity_cost"]);
      const transshipmentCount = firstDefinedNumber(objective, ["transshipment_count", "ts_count", "num_transshipments"])
        ?? firstDefinedNumber(metadata, ["transshipment_count", "ts_count", "num_transshipments"])
        ?? analysis.transshipmentCount;
      const runtime = firstDefinedNumber(metadata, ["elapsed_seconds", "runtime_seconds", "algorithm_runtime_seconds"]);
      const serviceCoverageRate = firstDefinedNumber(objective, ["service_lane_coverage_rate"])
        ?? firstDefinedNumber(metadata, ["service_lane_coverage_rate"]);
      const actualPortCalls = firstDefinedNumber(objective, ["actual_port_calls"])
        ?? firstDefinedNumber(metadata, ["actual_port_calls"]);
      const totalPortCalls = firstDefinedNumber(objective, ["total_port_calls"])
        ?? firstDefinedNumber(metadata, ["total_port_calls"]);
      const vesselUtilizationRate = firstDefinedNumber(objective, ["vessel_utilization_rate"])
        ?? firstDefinedNumber(metadata, ["vessel_utilization_rate"]);
      const vesselServiceDays = firstDefinedNumber(objective, ["vessel_service_days"])
        ?? firstDefinedNumber(metadata, ["vessel_service_days"]);
      const vesselAvailableDays = firstDefinedNumber(objective, ["vessel_available_days"])
        ?? firstDefinedNumber(metadata, ["vessel_available_days"]);
      const vesselDrydockDays = firstDefinedNumber(objective, ["vessel_drydock_days"])
        ?? firstDefinedNumber(metadata, ["vessel_drydock_days"]);
      const slotRate = firstDefinedNumber(objective, ["slot_utilization_rate", "slot_utilization"])
        ?? firstDefinedNumber(metadata, ["slot_utilization_rate", "slot_utilization"]);
      const requiredTeuDays = firstDefinedNumber(objective, ["slot_utilization_required_teu_days"])
        ?? firstDefinedNumber(metadata, ["slot_utilization_required_teu_days"]);
      const deployedTeuDays = firstDefinedNumber(objective, ["slot_utilization_deployed_teu_days"])
        ?? firstDefinedNumber(metadata, ["slot_utilization_deployed_teu_days"]);
      return [
        {
          group: "cost",
          label: "Opportunity Cost",
          value: opportunity === null ? "n/a" : formatUsd(opportunity),
          note: "sum of virtual vessel opportunity cost",
        },
        {
          group: "operational",
          label: "Service Lane Coverage Rate",
          value: formatPercent(serviceCoverageRate),
          note: actualPortCalls !== null && totalPortCalls !== null
            ? `${formatNumber(actualPortCalls)} actual / ${formatNumber(totalPortCalls)} total port calls`
            : "from evaluation output",
        },
